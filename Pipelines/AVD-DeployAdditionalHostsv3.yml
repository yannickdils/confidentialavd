trigger:
- none

pool:
  name: ${{ parameters.agentPool }}

parameters:
  - name: agentPool
    type: string
    default: '<AGENT_POOL_NAME>'
    displayName: "Agent pool name"

  - name: serviceConnection
    type: string
    default: '<SERVICE_CONNECTION_NAME>'
    displayName: "Azure DevOps service connection name"

  - name: approvalEnvironment
    type: string
    default: '<APPROVAL_ENVIRONMENT_NAME>'
    displayName: "Azure DevOps approval environment name"

  - name: jsonFilePath
    type: string
    default: 'Environments/Hostpools/hostpool.template.json'
    displayName: "Path to JSON configuration file (copy and customize from hostpool.template.json)"

  - name: DeploymentActivation
    type: string
    default: 'A'
    displayName: "A or B deployment activation"
    values:
    - A
    - B

  - name: operationType
    type: string
    default: 'add'
    displayName: "Operation type: add new hosts or replace existing hosts"
    values:
    - add
    - replace

  - name: confidentialCompute
    type: boolean
    default: false
    displayName: "Enable Confidential Compute for session hosts"

  - name: customerManagedKeys
    type: boolean
    default: false
    displayName: "Use Customer-Managed Keys (CMK) - requires Managed HSM. When false with CC enabled, uses Platform-Managed Keys (PMK)."

  - name: domainJoinType
    type: string
    default: 'fromConfig'
    displayName: "Domain join type (fromConfig = use JSON config value)"
    values:
    - fromConfig
    - AD
    - EntraID

  - name: keyUrl
    type: string
    default: 'none'
    displayName: "Managed HSM Key URL (only required when Confidential Compute + Customer-Managed Keys is enabled)"

  - name: ImageID
    type: string
    displayName: "The image ID Resource ID to be used (leave empty or 'none' for marketplace image from JSON config)"   
    default: "none"

  - name: deploymentIdentifier
    type: string
    default: "deployment"
    displayName: "Unique deployment identifier"

  # Parameters for adding hosts
  - name: startingHostNumber
    type: number
    default: 1
    displayName: "Starting host number (for add operation)"

  - name: additionalHostCount
    type: number
    default: 1
    displayName: "Number of hosts to add/replace"

  # Parameters for replacing hosts
  - name: hostsToReplace
    type: string
    default: "none"
    displayName: "Comma-separated list of host names to replace (leave empty or 'none' to replace all)"

  - name: userWarningMessage
    type: string
    default: "System maintenance will begin in {minutes} minutes. Please save your work and log off."
    displayName: "Warning message to send to users (use {minutes} as placeholder for time)"

  - name: warningDelayMinutes
    type: number
    default: 30
    displayName: "Minutes to wait after sending warning before force logoff"

  - name: cleanupDelayDays
    type: number
    default: 2
    displayName: "Days to wait before deleting old hosts (1-7 days)"
    values:
    - 1
    - 2
    - 3
    - 7

variables:
  - name: isReplaceOperation
    value: ${{ eq(parameters.operationType, 'replace') }}
  - name: isConfidentialCompute
    value: ${{ eq(parameters.confidentialCompute, true) }}
  - name: isCustomerManagedKeys
    value: ${{ and(eq(parameters.confidentialCompute, true), eq(parameters.customerManagedKeys, true)) }}

stages:
  - stage: approvalGate_${{ parameters.deploymentIdentifier }}
    displayName: 'Approval Gate'
    jobs:
      - deployment: hostsDeployment
        displayName: "Approval Gate for ${{ parameters.operationType }} Hosts"
        environment: ${{ parameters.approvalEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

  - stage: ValidateConfidentialCompute_${{ parameters.deploymentIdentifier }}
    displayName: 'Validate Confidential Compute Parameters'
    condition: and(succeeded('approvalGate_${{ parameters.deploymentIdentifier }}'), eq('${{ parameters.confidentialCompute }}', 'true'))
    dependsOn:
      - approvalGate_${{ parameters.deploymentIdentifier }}
    jobs:
      - job: Validate
        displayName: 'Validate CC Parameters'
        steps:
          - task: PowerShell@2
            displayName: "Validate Confidential Compute Parameters in JSON"
            inputs:
              targetType: "inline"
              script: |
                Write-Host "##[section]Validating Confidential Compute Parameters from JSON config"

                $jsonFilePath = "$env:jsonFilePath"
                if (-not (Test-Path $jsonFilePath)) {
                  Write-Host "##vso[task.logissue type=error]JSON file not found at '$jsonFilePath'."
                  exit 1
                }

                $jsonParams = Get-Content $jsonFilePath | ConvertFrom-Json
                $valid = $true
                $isCustomerManagedKeys = "${{ parameters.customerManagedKeys }}" -eq "True"

                Write-Host "Confidential Compute: Enabled"
                Write-Host "Customer-Managed Keys (CMK): $isCustomerManagedKeys"

                if ($isCustomerManagedKeys) {
                  Write-Host ""
                  Write-Host "##[section]Validating CMK-specific parameters..."

                  # Validate diskEncryptionSetName
                  $desName = $jsonParams.diskEncryptionSetName
                  if ([string]::IsNullOrEmpty($desName) -or $desName -eq 'notinuse') {
                    Write-Host "##vso[task.logissue type=error]'diskEncryptionSetName' is missing or set to 'notinuse' in the JSON config. Required for Customer-Managed Keys."
                    $valid = $false
                  } else {
                    Write-Host "✅ Disk Encryption Set Name: $desName"
                  }

                  # Validate keyVaultResourceGroup (used as the RG where DES lives)
                  $kvRg = $jsonParams.keyVaultResourceGroup
                  if (-not $kvRg) { $kvRg = $jsonParams.keyvaultresourcegroup }
                  if ([string]::IsNullOrEmpty($kvRg)) {
                    Write-Host "##vso[task.logissue type=error]'keyVaultResourceGroup' is missing in the JSON config. It is needed to locate the Disk Encryption Set."
                    $valid = $false
                  } else {
                    Write-Host "✅ Key Vault Resource Group (DES location): $kvRg"
                  }

                  # Validate keyUrl - use pipeline parameter if provided, otherwise fall back to JSON config
                  $keyUrlParam = "${{ parameters.keyUrl }}"
                  if ($keyUrlParam -eq 'none') { $keyUrlParam = '' }
                  $keyUrlJson = $jsonParams.managedHsmKeyUrl
                  
                  if (-not [string]::IsNullOrEmpty($keyUrlParam)) {
                    $keyUrl = $keyUrlParam
                    Write-Host "Using keyUrl from pipeline parameter (override)"
                  } elseif (-not [string]::IsNullOrEmpty($keyUrlJson)) {
                    $keyUrl = $keyUrlJson
                    Write-Host "Using keyUrl from JSON config (managedHsmKeyUrl)"
                  } else {
                    $keyUrl = ""
                  }

                  if ([string]::IsNullOrEmpty($keyUrl)) {
                    Write-Host "##vso[task.logissue type=error]'keyUrl' is required when Customer-Managed Keys is enabled."
                    Write-Host "##vso[task.logissue type=error]Either provide it as a pipeline parameter, or set 'managedHsmKeyUrl' in the JSON config file."
                    $valid = $false
                  } elseif ($keyUrl -notmatch "^https://.+\.managedhsm\.azure\.net/keys/.+/.+$") {
                    Write-Host "##vso[task.logissue type=error]Invalid 'keyUrl' format: $keyUrl"
                    Write-Host "##vso[task.logissue type=error]Expected: https://<hsm-name>.managedhsm.azure.net/keys/<key-name>/<key-version>"
                    $valid = $false
                  } else {
                    Write-Host "✅ Managed HSM Key URL: $keyUrl"
                  }
                } else {
                  Write-Host ""
                  Write-Host "##[section]Platform-Managed Keys (PMK) mode - no DES or Managed HSM required"
                  Write-Host "✅ Session hosts will use VMGuestStateOnly encryption with platform-managed keys"
                }

                # Validate vmSizeCC is present and is a Confidential Compute capable size
                $vmSizeCC = $jsonParams.vmSizeCC
                if ([string]::IsNullOrEmpty($vmSizeCC) -or $vmSizeCC -eq 'notinuse') {
                  Write-Host "##vso[task.logissue type=error]'vmSizeCC' is missing or set to 'notinuse' in the JSON config."
                  Write-Host "##vso[task.logissue type=error]Add a 'vmSizeCC' field with a CC-capable VM size (e.g., Standard_DC8as_v5, Standard_EC8as_v6)."
                  $valid = $false
                } elseif ($vmSizeCC -notmatch "^Standard_(DC|EC)\d+a?d?s?_v\d+$") {
                  Write-Host "##vso[task.logissue type=error]VM size '$vmSizeCC' (vmSizeCC) is not a Confidential Compute capable size."
                  Write-Host "##vso[task.logissue type=error]Confidential Compute requires DC-series or EC-series VMs (e.g., Standard_DC4as_v5, Standard_EC4as_v5)."
                  Write-Host "##vso[task.logissue type=error]Please update 'vmSizeCC' in the JSON config file."
                  $valid = $false
                } else {
                  Write-Host "✅ VM Size CC (CC capable): $vmSizeCC"
                  Write-Host "   Standard VM Size (non-CC): $($jsonParams.vmSize)"
                }

                Write-Host "✅ Confidential Compute: Enabled"

                if (-not $valid) {
                  Write-Host "##vso[task.logissue type=error]Confidential Compute validation failed."
                  exit 1
                }

                Write-Host "##[section]✅ Confidential Compute parameters validated successfully"
            env:
              jsonFilePath: ${{ parameters.jsonFilePath }}

  - stage: InitializeParameters_${{ parameters.deploymentIdentifier }}
    displayName: 'Initialize Parameters'
    condition: |
      and(
        succeeded('approvalGate_${{ parameters.deploymentIdentifier }}'),
        or(
          eq('${{ parameters.confidentialCompute }}', 'false'),
          succeeded('ValidateConfidentialCompute_${{ parameters.deploymentIdentifier }}')
        )
      )
    dependsOn:
      - approvalGate_${{ parameters.deploymentIdentifier }}
      - ${{ if eq(parameters.confidentialCompute, true) }}:
        - ValidateConfidentialCompute_${{ parameters.deploymentIdentifier }}
    jobs:
      - job: LoadParameters
        displayName: 'Load and Validate Parameters'
        steps:
          - task: PowerShell@2
            displayName: "Load parameters from JSON file"
            inputs:
              targetType: "inline"
              script: |
                try {
                  $jsonFilePath = "$env:jsonFilePath"
                  Write-Host "##[section]Loading JSON Configuration"
                  Write-Host "JSON File: '$jsonFilePath'"
                  Write-Host "Operation Type: $env:operationType"
                  Write-Host "Host Count: $env:additionalHostCount"
                  Write-Host "Confidential Compute: $env:confidentialCompute"

                  if ([string]::IsNullOrEmpty($jsonFilePath)) {
                      Write-Host "##vso[task.logissue type=error]Parameter 'jsonFilePath' is required but was not provided."
                      exit 1
                  } elseif (Test-Path $jsonFilePath) {
                    $jsonParams = Get-Content $jsonFilePath | ConvertFrom-Json
                    Write-Host "##[section]JSON file loaded successfully"
                    
                    # Validate required parameters exist in JSON
                    $requiredParams = @("location","subscriptionname", "hostpoolname", "hostpoolresourcegroup", 
                                      "vmSize", "vmNamePrefix", "subnetId", "DomainJoinKeyVaultID", 
                                      "keyvaultname", "automationaccountname", "automationresourcegroup",
                                      "LogAnalyticsWorkspaceId")
                    
                    $missingParams = @()
                    foreach ($param in $requiredParams) {
                      if (-not (Get-Member -InputObject $jsonParams -Name $param -MemberType Properties)) {
                        $missingParams += $param
                      }
                    }
                    
                    if ($missingParams.Count -gt 0) {
                      Write-Host "##vso[task.logissue type=error]Missing required parameters in JSON file:"
                      foreach ($param in $missingParams) {
                        Write-Host "##vso[task.logissue type=error]  - $param"
                      }
                      exit 1
                    }
                    
                    # Set variables based on JSON content
                    Write-Host "##[section]Setting pipeline variables..."
                    Write-Host "##vso[task.setvariable variable=subscriptionname;isOutput=true]$($jsonParams.subscriptionname)"
                    Write-Host "##vso[task.setvariable variable=location;isOutput=true]$($jsonParams.location)"
                    
                    # Use vmLocation for session hosts if specified, otherwise fall back to location
                    $vmLocation = if ($jsonParams.vmLocation) { $jsonParams.vmLocation } else { $jsonParams.location }
                    Write-Host "##vso[task.setvariable variable=vmLocation;isOutput=true]$vmLocation"
                    Write-Host "VM Location for Session Hosts: $vmLocation"
                    
                    Write-Host "##vso[task.setvariable variable=hostpoolname;isOutput=true]$($jsonParams.hostpoolname)"
                    Write-Host "##vso[task.setvariable variable=hostpoolresourcegroup;isOutput=true]$($jsonParams.hostpoolresourcegroup)"
                    
                    # Use hostsResourceGroup for VMs if specified, otherwise fall back to hostpoolresourcegroup
                    $hostsRg = if ($jsonParams.hostsResourceGroup) { $jsonParams.hostsResourceGroup } else { $jsonParams.hostpoolresourcegroup }
                    Write-Host "##vso[task.setvariable variable=hostsresourcegroup;isOutput=true]$hostsRg"
                    Write-Host "Hosts Resource Group (VMs): $hostsRg"
                    
                    # Select the appropriate VM size based on Confidential Compute toggle
                    $isCC = "${{ parameters.confidentialCompute }}" -eq "True"
                    if ($isCC) {
                      $vmSizeCC = if ($jsonParams.vmSizeCC) { $jsonParams.vmSizeCC } else { '' }
                      if ([string]::IsNullOrEmpty($vmSizeCC) -or $vmSizeCC -eq 'notinuse') {
                        Write-Host "##vso[task.logissue type=error]'vmSizeCC' is missing or set to 'notinuse' in the JSON config. Cannot enable Confidential Compute without a CC-capable VM size."
                        exit 1
                      }
                      $effectiveVmSize = $vmSizeCC
                      Write-Host "Confidential Compute enabled: using vmSizeCC '$effectiveVmSize' (standard vmSize: '$($jsonParams.vmSize)')"
                    } else {
                      $effectiveVmSize = $jsonParams.vmSize
                      $vmSizeCC = if ($jsonParams.vmSizeCC) { $jsonParams.vmSizeCC } else { '' }
                      Write-Host "Confidential Compute disabled: using vmSize '$effectiveVmSize' (CC vmSizeCC: '$vmSizeCC')"
                    }
                    Write-Host "##vso[task.setvariable variable=vmSize;isOutput=true]$effectiveVmSize"
                    Write-Host "##vso[task.setvariable variable=vmNamePrefix;isOutput=true]$($jsonParams.vmNamePrefix)"
                    Write-Host "##vso[task.setvariable variable=subnetId;isOutput=true]$($jsonParams.subnetId)"
                    Write-Host "##vso[task.setvariable variable=DomainJoinKeyVaultID;isOutput=true]$($jsonParams.DomainJoinKeyVaultID)"
                    Write-Host "##vso[task.setvariable variable=keyvaultname;isOutput=true]$($jsonParams.keyvaultname)"
                    Write-Host "##vso[task.setvariable variable=LogAnalyticsWorkspaceId;isOutput=true]$($jsonParams.LogAnalyticsWorkspaceId)"
                    Write-Host "##vso[task.setvariable variable=automationaccountname;isOutput=true]$($jsonParams.automationaccountname)"
                    Write-Host "##vso[task.setvariable variable=automationresourcegroup;isOutput=true]$($jsonParams.automationresourcegroup)"
                    
                    # Set the pipeline parameters as variables (normalize 'none' sentinel to empty string)
                    Write-Host "##vso[task.setvariable variable=operationType;isOutput=true]${{ parameters.operationType }}"
                    Write-Host "##vso[task.setvariable variable=startingHostNumber;isOutput=true]${{ parameters.startingHostNumber }}"
                    Write-Host "##vso[task.setvariable variable=additionalHostCount;isOutput=true]${{ parameters.additionalHostCount }}"
                    $imageIdParam = "${{ parameters.ImageID }}"
                    if ($imageIdParam -eq 'none') { $imageIdParam = '' }
                    Write-Host "##vso[task.setvariable variable=SharedImageId;isOutput=true]$imageIdParam"
                    $hostsToReplaceParam = "${{ parameters.hostsToReplace }}"
                    if ($hostsToReplaceParam -eq 'none') { $hostsToReplaceParam = '' }
                    Write-Host "##vso[task.setvariable variable=hostsToReplace;isOutput=true]$hostsToReplaceParam"
                    Write-Host "##vso[task.setvariable variable=userWarningMessage;isOutput=true]${{ parameters.userWarningMessage }}"
                    Write-Host "##vso[task.setvariable variable=warningDelayMinutes;isOutput=true]${{ parameters.warningDelayMinutes }}"
                    Write-Host "##vso[task.setvariable variable=cleanupDelayDays;isOutput=true]${{ parameters.cleanupDelayDays }}"

                    # Set marketplace image parameters from JSON config (used as fallback when SharedImageId is empty)
                    $imagePublisher = if ($jsonParams.imagePublisher) { $jsonParams.imagePublisher } else { 'microsoftwindowsdesktop' }
                    $imageOffer = if ($jsonParams.imageOffer) { $jsonParams.imageOffer } else { 'office-365' }
                    $imageSku = if ($jsonParams.imageSku) { $jsonParams.imageSku } else { 'win11-24h2-avd-m365' }
                    $imageVersion = if ($jsonParams.imageVersion) { $jsonParams.imageVersion } else { 'latest' }
                    Write-Host "##vso[task.setvariable variable=imagePublisher;isOutput=true]$imagePublisher"
                    Write-Host "##vso[task.setvariable variable=imageOffer;isOutput=true]$imageOffer"
                    Write-Host "##vso[task.setvariable variable=imageSku;isOutput=true]$imageSku"
                    Write-Host "##vso[task.setvariable variable=imageVersion;isOutput=true]$imageVersion"
                    
                    if ([string]::IsNullOrEmpty($imageIdParam)) {
                      Write-Host "##[section]Image Source: Marketplace (${imagePublisher}/${imageOffer}/${imageSku}/${imageVersion})"
                    } else {
                      Write-Host "##[section]Image Source: Shared Image Gallery ($imageIdParam)"
                    }

                    # Set domain join type: pipeline parameter overrides JSON config value
                    $domainJoinTypeParam = "${{ parameters.domainJoinType }}"
                    if ($domainJoinTypeParam -eq 'fromConfig') {
                      $domainJoinType = if ($jsonParams.domainJoinType) { $jsonParams.domainJoinType } else { 'AD' }
                    } else {
                      $domainJoinType = $domainJoinTypeParam
                    }
                    $isEntraJoin = if ($domainJoinType -eq 'EntraID') { 'true' } else { 'false' }
                    Write-Host "##vso[task.setvariable variable=domainJoinType;isOutput=true]$domainJoinType"
                    Write-Host "##vso[task.setvariable variable=isEntraJoin;isOutput=true]$isEntraJoin"
                    Write-Host "##[section]Domain Join Type: $domainJoinType (Entra ID Join: $isEntraJoin)"

                    # Set confidential compute variables
                    Write-Host "##vso[task.setvariable variable=confidentialCompute;isOutput=true]${{ parameters.confidentialCompute }}"
                    Write-Host "##vso[task.setvariable variable=customerManagedKeys;isOutput=true]${{ parameters.customerManagedKeys }}"

                    # Read CC resource names from JSON config
                    $diskEncryptionSetName = if ($jsonParams.diskEncryptionSetName) { $jsonParams.diskEncryptionSetName } else { '' }
                    $keyVaultResourceGroup = if ($jsonParams.keyVaultResourceGroup) { $jsonParams.keyVaultResourceGroup } elseif ($jsonParams.keyvaultresourcegroup) { $jsonParams.keyvaultresourcegroup } else { '' }
                    Write-Host "##vso[task.setvariable variable=diskEncryptionSetName;isOutput=true]$diskEncryptionSetName"
                    Write-Host "##vso[task.setvariable variable=keyVaultResourceGroup;isOutput=true]$keyVaultResourceGroup"

                    # keyUrl: pipeline parameter overrides JSON config value
                    $keyUrlParam = "${{ parameters.keyUrl }}"
                    if ($keyUrlParam -eq 'none') { $keyUrlParam = '' }
                    $keyUrlJson = if ($jsonParams.managedHsmKeyUrl) { $jsonParams.managedHsmKeyUrl } else { '' }
                    $keyUrl = if (-not [string]::IsNullOrEmpty($keyUrlParam)) { $keyUrlParam } else { $keyUrlJson }
                    Write-Host "##vso[task.setvariable variable=keyUrl;isOutput=true]$keyUrl"
                    
                    Write-Host "##[section]✅ Parameters loaded successfully"
                  } else {
                    Write-Host "##vso[task.logissue type=error]JSON file not found at '$jsonFilePath'."
                    exit 1
                  }
                } catch {
                  Write-Host "##vso[task.logissue type=error]Error reading JSON file: $($_.Exception.Message)"
                  exit 1
                }
            env:
              jsonFilePath: ${{ parameters.jsonFilePath }}
              operationType: ${{ parameters.operationType }}
              additionalHostCount: ${{ parameters.additionalHostCount }}
              confidentialCompute: ${{ parameters.confidentialCompute }}
            name: setVariables

          - task: PowerShell@2
            displayName: "Display loaded variables"
            inputs:
              targetType: "inline"
              script: |
                Write-Host "##[section]=============== LOADED VARIABLES ==============="
                
                $operationType = $env:OPERATION_TYPE
                $subscriptionname = $env:SUBSCRIPTION_NAME
                $location = $env:LOCATION
                $hostpoolname = $env:HOSTPOOL_NAME
                $hostpoolresourcegroup = $env:HOSTPOOL_RG
                $vmSize = $env:VM_SIZE
                $vmNamePrefix = $env:VM_PREFIX
                $additionalHostCount = $env:HOST_COUNT
                $startingHostNumber = $env:START_NUMBER
                $hostsToReplace = $env:HOSTS_TO_REPLACE
                $warningDelay = $env:WARNING_DELAY
                $cleanupDelay = $env:CLEANUP_DELAY
                $confidentialCompute = $env:CONFIDENTIAL_COMPUTE
                $domainJoinType = $env:DOMAIN_JOIN_TYPE
                
                Write-Host "Operation Type: $operationType"
                Write-Host "Subscription Name: $subscriptionname"
                Write-Host "Location: $location"
                Write-Host "Hostpool Name: $hostpoolname"
                Write-Host "Hostpool Resource Group: $hostpoolresourcegroup"
                Write-Host "VM size (effective): $vmSize"
                Write-Host "VM name prefix: $vmNamePrefix"
                Write-Host "Host Count: $additionalHostCount"
                Write-Host "Confidential Compute: $confidentialCompute"
                Write-Host "Domain Join Type: $domainJoinType"
                
                if ($confidentialCompute -eq 'True') {
                  Write-Host "  → Using CC VM size (vmSizeCC from JSON)"
                  Write-Host "  → Customer-Managed Keys: $env:CUSTOMER_MANAGED_KEYS"
                  if ($env:CUSTOMER_MANAGED_KEYS -eq 'True') {
                    Write-Host "Disk Encryption Set Name: $env:DISK_ENCRYPTION_SET_NAME"
                    Write-Host "Key Vault Resource Group (DES): $env:KV_RESOURCE_GROUP"
                    Write-Host "Managed HSM Key URL: $env:KEY_URL"
                  } else {
                    Write-Host "  → Platform-Managed Keys (PMK) - no DES or HSM needed"
                  }
                }
                
                if ($operationType -eq 'add') {
                  Write-Host "Starting Host Number: $startingHostNumber"
                } else {
                  if ([string]::IsNullOrEmpty($hostsToReplace)) {
                    Write-Host "Hosts to Replace: (All hosts)"
                  } else {
                    Write-Host "Hosts to Replace: $hostsToReplace"
                  }
                  Write-Host "Warning Delay: $warningDelay minutes"
                  Write-Host "Cleanup Delay: $cleanupDelay days"
                }
                
                Write-Host "Build ID: $env:BUILD_BUILDID"
                Write-Host "Build Number: $env:BUILD_BUILDNUMBER"
                Write-Host "Requested By: $env:BUILD_REQUESTEDFOR"
                Write-Host "================================================"
            env:
              OPERATION_TYPE: $(setVariables.operationType)
              SUBSCRIPTION_NAME: $(setVariables.subscriptionname)
              LOCATION: $(setVariables.location)
              HOSTPOOL_NAME: $(setVariables.hostpoolname)
              HOSTPOOL_RG: $(setVariables.hostpoolresourcegroup)
              VM_SIZE: $(setVariables.vmSize)
              VM_PREFIX: $(setVariables.vmNamePrefix)
              HOST_COUNT: $(setVariables.additionalHostCount)
              START_NUMBER: $(setVariables.startingHostNumber)
              HOSTS_TO_REPLACE: $(setVariables.hostsToReplace)
              WARNING_DELAY: $(setVariables.warningDelayMinutes)
              CLEANUP_DELAY: $(setVariables.cleanupDelayDays)
              CONFIDENTIAL_COMPUTE: $(setVariables.confidentialCompute)
              CUSTOMER_MANAGED_KEYS: $(setVariables.customerManagedKeys)
              DOMAIN_JOIN_TYPE: $(setVariables.domainJoinType)
              DISK_ENCRYPTION_SET_NAME: $(setVariables.diskEncryptionSetName)
              KV_RESOURCE_GROUP: $(setVariables.keyVaultResourceGroup)
              KEY_URL: $(setVariables.keyUrl)
              BUILD_BUILDID: $(Build.BuildId)
              BUILD_BUILDNUMBER: $(Build.BuildNumber)
              BUILD_REQUESTEDFOR: $(Build.RequestedFor)

  - stage: RetrieveExistingResources_${{ parameters.deploymentIdentifier }}
    displayName: "Retrieve Existing AVD Resources"
    dependsOn:
      - InitializeParameters_${{ parameters.deploymentIdentifier }}
    variables:
      subscriptionname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subscriptionname'] ]
      hostpoolname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolname'] ]
      hostpoolresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolresourcegroup'] ]
      keyvaultname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.keyvaultname'] ]
      operationType: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.operationType'] ]
      hostsToReplace: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostsToReplace'] ]
    jobs:
      - job: RetrieveResources
        displayName: 'Retrieve Resources'
        steps:
          - task: AzureCLI@2
            displayName: "Retrieve Existing Resources"
            name: existingResources
            inputs:
              azureSubscription: '${{ parameters.serviceConnection }}'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Set error action preference to continue on warnings
                $ErrorActionPreference = 'Continue'
                $WarningPreference = 'SilentlyContinue'
                
                # Suppress Azure CLI warnings
                $env:AZURE_CORE_COLLECT_TELEMETRY = "false"
                
                az account set --subscription $(subscriptionname)
                
                Write-Host "##[section]Retrieving Host Pool Information"
                
                # Get the actual subscription ID (not the name)
                $subscriptionId = az account show --query "id" -o tsv 2>$null
                Write-Host "Subscription ID: $subscriptionId"
                
                # Get Host Pool ID
                $apiVersion = "2023-09-05"
                $hostPoolUri = "https://management.azure.com/subscriptions/${subscriptionId}/resourceGroups/$(hostpoolresourcegroup)/providers/Microsoft.DesktopVirtualization/hostPools/$(hostpoolname)?api-version=${apiVersion}"
                
                $hostPoolResult = az rest --method GET --uri "$hostPoolUri" 2>$null
                if ($LASTEXITCODE -eq 0) {
                    $hostPoolData = $hostPoolResult | ConvertFrom-Json
                    $hostPool = $hostPoolData.id
                    Write-Host "✅ Host Pool ID: $hostPool"
                    Write-Host "##vso[task.setvariable variable=hostPoolId;isOutput=true]$hostPool"
                } else {
                    Write-Host "##vso[task.logissue type=error]Host Pool '$(hostpoolname)' not found."
                    exit 1
                }
                
                # Get existing session hosts if this is a replace operation
                if ("$(operationType)" -eq "replace") {
                  Write-Host "##[section]Retrieving Session Hosts for Replacement"
                  
                  # Build the correct URI for session hosts
                  $sessionHostsUri = "https://management.azure.com/subscriptions/${subscriptionId}/resourceGroups/$(hostpoolresourcegroup)/providers/Microsoft.DesktopVirtualization/hostPools/$(hostpoolname)/sessionHosts?api-version=${apiVersion}"
                  
                  Write-Host "REST URI: $sessionHostsUri"
                  
                  # Get session hosts
                  $result = az rest --method GET --uri "$sessionHostsUri" -o json 2>&1
                  
                  # Clean the result by removing warning lines
                  $resultLines = $result -split "`n"
                  $jsonLines = $resultLines | Where-Object { $_ -notmatch "^WARNING:" -and $_ -ne "" }
                  $cleanJson = $jsonLines -join "`n"
                  
                  # Parse the JSON
                  try {
                    $sessionHostsData = $cleanJson | ConvertFrom-Json
                    
                    if ($sessionHostsData.value -and $sessionHostsData.value.Count -gt 0) {
                      Write-Host "✅ Found $($sessionHostsData.value.Count) session host(s)"
                      
                      # Transform to expected format
                      $transformedData = $sessionHostsData.value | ForEach-Object {
                        $hostName = $_.name -split "/" | Select-Object -Last 1
                        Write-Host "  - Found host: $hostName"
                        @{
                          name = $_.name
                          resourceId = $_.id
                          status = $_.properties.status
                          sessions = if ($_.properties.sessions) { $_.properties.sessions } else { 0 }
                          allowNewSession = $_.properties.allowNewSession
                        }
                      }
                      
                      # Handle host filtering
                      $hostsToReplaceParam = "$(hostsToReplace)"
                      
                      if ([string]::IsNullOrEmpty($hostsToReplaceParam) -or $hostsToReplaceParam.ToLower() -eq "all") {
                        $hostsToProcess = $transformedData
                        Write-Host "Will replace ALL $($transformedData.Count) hosts"
                      } else {
                        # User specified specific hosts
                        $hostsFilter = $hostsToReplaceParam -split "," | ForEach-Object { $_.Trim() }
                        
                        $hostsToProcess = $transformedData | Where-Object { 
                          $hostName = $_.name -split "/" | Select-Object -Last 1
                          $hostNameNoDomain = $hostName -replace '\..*$', ''
                          
                          # Check both full name and name without domain
                          ($hostsFilter -contains $hostName) -or ($hostsFilter -contains $hostNameNoDomain)
                        }
                        
                        Write-Host "Filtering to specified hosts: $($hostsFilter -join ', ')"
                        Write-Host "Matched $($hostsToProcess.Count) hosts"
                      }
                      
                      if ($hostsToProcess.Count -eq 0) {
                        Write-Host "##vso[task.logissue type=error]No matching hosts found to replace."
                        exit 1
                      }
                      
                      $hostsList = $hostsToProcess | ConvertTo-Json -Compress
                      Write-Host "##vso[task.setvariable variable=hostsToProcess;isOutput=true]$hostsList"
                      
                    } else {
                      Write-Host "##vso[task.logissue type=warning]No session hosts found in host pool"
                      Write-Host "##vso[task.setvariable variable=hostsToProcess;isOutput=true][]"
                    }
                  } catch {
                    Write-Host "##vso[task.logissue type=error]Error parsing session hosts: $_"
                    exit 1
                  }
                }
                
                Write-Host "##[section]Retrieving KeyVault Information"
                # Get KeyVault ID
                $keyVaultOutput = az keyvault show `
                  --name "$(keyvaultname)" `
                  --query "id" -o tsv 2>&1
                
                $keyVault = $keyVaultOutput | Where-Object { $_ -notmatch "WARNING:|ERROR:" -and $_ -ne "" } | Select-Object -First 1
                
                if ([string]::IsNullOrEmpty($keyVault) -or $keyVault -notmatch "^/subscriptions/") {
                  Write-Host "##vso[task.logissue type=error]KeyVault '$(keyvaultname)' not found in subscription '$(subscriptionname)'. Please verify the 'keyVaultName' value in the JSON configuration file."
                  Write-Host "##vso[task.logissue type=error]az keyvault show output: $keyVaultOutput"
                  exit 1
                }
                
                Write-Host "✅ KeyVault ID: $keyVault"
                Write-Host "##vso[task.setvariable variable=keyVaultId;isOutput=true]$keyVault"
                
                # Get KeyVault Resource Group
                if ($keyVault -match "/resourceGroups/([^/]+)/") {
                  $kvResourceGroup = $matches[1]
                  Write-Host "✅ KeyVault Resource Group: $kvResourceGroup"
                  Write-Host "##vso[task.setvariable variable=kvResourceGroup;isOutput=true]$kvResourceGroup"
                } else {
                  Write-Host "##vso[task.logissue type=error]Could not extract resource group from KeyVault ID: $keyVault"
                  exit 1
                }
                
                Write-Host "##[section]Retrieving Managed Identity"
                # Get Managed Identity ID (Key Vault UAMI, NOT the CC UAMI)
                # Exclude CC UAMIs (uami-cc-*) which are used for Disk Encryption Sets
                $managedIdentitiesJson = az identity list `
                  --resource-group "$kvResourceGroup" `
                  --query "[?contains(name, 'uami-') && !contains(name, 'uami-cc-')]" 2>&1
                
                $managedIdentitiesJson = $managedIdentitiesJson | Where-Object { $_ -notmatch "WARNING:" } | Out-String
                
                if (-not [string]::IsNullOrWhiteSpace($managedIdentitiesJson)) {
                  $managedIdentities = $managedIdentitiesJson | ConvertFrom-Json
                  
                  if ($managedIdentities -and $managedIdentities.Count -gt 0) {
                    $managedIdentityId = $managedIdentities[0].id
                    Write-Host "✅ Managed Identity ID: $managedIdentityId"
                    Write-Host "##vso[task.setvariable variable=managedIdentityId;isOutput=true]$managedIdentityId"
                  } else {
                    Write-Host "##vso[task.logissue type=error]No managed identity found in resource group '$kvResourceGroup'."
                    exit 1
                  }
                } else {
                  Write-Host "##vso[task.logissue type=error]No managed identity found in resource group '$kvResourceGroup'."
                  exit 1
                }
                
                Write-Host "##[section]Retrieving Data Collection Rule"
                # Get Data Collection Rule ID
                $dataCollectionRulesJson = $null
                try {
                    $dataCollectionRulesJson = az monitor data-collection rule list `
                      --resource-group "$(hostpoolresourcegroup)" `
                      --query "[?contains(name, 'microsoft-avdi')]" 2>&1
                    
                    $dataCollectionRulesJson = $dataCollectionRulesJson | Where-Object { 
                        $_ -notmatch "WARNING:" -and $_ -ne "" 
                    } | Out-String
                    
                    if (-not [string]::IsNullOrWhiteSpace($dataCollectionRulesJson)) {
                        $dataCollectionRules = $dataCollectionRulesJson | ConvertFrom-Json
                        
                        if ($dataCollectionRules -and $dataCollectionRules.Count -gt 0) {
                          $dataCollectionRuleId = $dataCollectionRules[0].id
                          Write-Host "✅ Data Collection Rule ID: $dataCollectionRuleId"
                          Write-Host "##vso[task.setvariable variable=dataCollectionRuleId;isOutput=true]$dataCollectionRuleId"
                        } else {
                          Write-Host "⚠️ No data collection rule found. Hosts will be deployed without monitoring."
                          Write-Host "##vso[task.setvariable variable=dataCollectionRuleId;isOutput=true]"
                        }
                    } else {
                        Write-Host "⚠️ No data collection rule found. Hosts will be deployed without monitoring."
                        Write-Host "##vso[task.setvariable variable=dataCollectionRuleId;isOutput=true]"
                    }
                } catch {
                    Write-Host "⚠️ Error retrieving data collection rule: $_. Hosts will be deployed without monitoring."
                    Write-Host "##vso[task.setvariable variable=dataCollectionRuleId;isOutput=true]"
                }
                
                Write-Host "##[section]✅ Resource retrieval completed successfully"

  # Register Confidential Compute feature flags (only when Confidential Compute is enabled)
  - stage: RegisterCCFeatures_${{ parameters.deploymentIdentifier }}
    displayName: "Register Confidential Compute Feature Flags"
    condition: and(succeeded(), eq('${{ parameters.confidentialCompute }}', 'true'))
    dependsOn:
      - InitializeParameters_${{ parameters.deploymentIdentifier }}
    variables:
      subscriptionname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subscriptionname'] ]
      vmSize: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.vmSize'] ]
    jobs:
      - job: RegisterFeatures
        displayName: 'Register CC Feature Flags'
        steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: "Register Required Feature Flags"
            name: "registerFeatures"
            continueOnError: true
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "scriptPath"
              scriptPath: "$(System.DefaultWorkingDirectory)/Scripts/Register-CCFeatureFlags.ps1"
              arguments: '-SubscriptionName "$(subscriptionname)" -VmSize "$(vmSize)"'

  # Deploy Disk Encryption Set (only when Confidential Compute + Customer-Managed Keys is enabled)
  - stage: DeployDiskEncryptionSet_${{ parameters.deploymentIdentifier }}
    displayName: "Deploy Disk Encryption Set"
    condition: and(not(failed()), eq('${{ parameters.confidentialCompute }}', 'true'), eq('${{ parameters.customerManagedKeys }}', 'true'))
    dependsOn:
      - InitializeParameters_${{ parameters.deploymentIdentifier }}
      - RetrieveExistingResources_${{ parameters.deploymentIdentifier }}
      - RegisterCCFeatures_${{ parameters.deploymentIdentifier }}
    variables:
      subscriptionname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subscriptionname'] ]
      vmLocation: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.vmLocation'] ]
      hostpoolname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolname'] ]
      keyVaultResourceGroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.keyVaultResourceGroup'] ]
      diskEncryptionSetName: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.diskEncryptionSetName'] ]
      keyUrl: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.keyUrl'] ]
    jobs:
      - job: Deploy
        displayName: 'Deploy DES'
        steps:
          - task: AzureCLI@2
            displayName: "Retrieve CC UAMI"
            name: "ccIdentity"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                $ErrorActionPreference = 'Stop'
                az account set --subscription $(subscriptionname)
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##vso[task.logissue type=error]Failed to set subscription to '$(subscriptionname)'"
                  exit 1
                }

                $uamiName = "uami-cc-$(hostpoolname)"
                $resourceGroup = "$(keyVaultResourceGroup)"

                Write-Host "##[section]Looking up CC UAMI '$uamiName' in resource group '$resourceGroup'"

                $uamiJson = az identity show --name $uamiName --resource-group $resourceGroup 2>$null
                if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrEmpty($uamiJson)) {
                  Write-Host "##vso[task.logissue type=error]CC UAMI '$uamiName' not found in resource group '$resourceGroup'."
                  Write-Host "##vso[task.logissue type=error]Run the HostPool Deployment pipeline with Confidential Compute enabled first to create the UAMI."
                  exit 1
                }

                $uami = $uamiJson | ConvertFrom-Json
                $uamiId = $uami.id

                if ([string]::IsNullOrEmpty($uamiId)) {
                  Write-Host "##vso[task.logissue type=error]CC UAMI '$uamiName' was found but has no resource ID. This should not happen."
                  exit 1
                }

                Write-Host "✅ CC UAMI found: $uamiId"
                Write-Host "##vso[task.setvariable variable=ccUamiId;isOutput=true]$uamiId"

          - task: AzureCLI@2
            displayName: "Deploy Disk Encryption Set"
            name: "deployDES"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                $ErrorActionPreference = 'Stop'
                az account set --subscription $(subscriptionname)
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##vso[task.logissue type=error]Failed to set subscription to '$(subscriptionname)'"
                  exit 1
                }

                $resourceGroup = "$(keyVaultResourceGroup)"
                $desName = "$(diskEncryptionSetName)"
                $ccUamiId = "$(ccIdentity.ccUamiId)"
                $keyUrl = "$(keyUrl)"

                # Resolve the Managed HSM location from the key URL
                # The DES must be in the same region as the HSM, NOT the VM region
                $hsmName = ""
                if ($keyUrl -match "^https://([^.]+)\.managedhsm\.azure\.net") {
                  $hsmName = $matches[1]
                }

                $desLocation = "$(vmLocation)"
                if (-not [string]::IsNullOrEmpty($hsmName)) {
                  Write-Host "Resolving location for Managed HSM '$hsmName'..."
                  # Search for the HSM across all subscriptions the SPN has access to
                  $allSubs = az account list --query "[].id" -o tsv 2>$null
                  foreach ($subId in $allSubs) {
                    $hsmLocation = az rest --method GET `
                      --uri "https://management.azure.com/subscriptions/$subId/providers/Microsoft.KeyVault/managedHSMs?api-version=2023-07-01" `
                      --query "value[?name=='$hsmName'].location | [0]" -o tsv 2>$null
                    if (-not [string]::IsNullOrEmpty($hsmLocation)) {
                      $desLocation = $hsmLocation
                      Write-Host "[OK] Managed HSM '$hsmName' found in subscription '$subId', region '$desLocation'"
                      break
                    }
                  }
                  if ($desLocation -eq "$(vmLocation)") {
                    Write-Host "##[warning]Could not resolve Managed HSM location. Falling back to VM location '$(vmLocation)'."
                    Write-Host "##[warning]If the HSM is in a different region, the deployment will fail. Add the HSM subscription to the SPN access."
                  }
                }

                if ($desLocation -ne "$(vmLocation)") {
                  Write-Host "##[warning]DES location '$desLocation' differs from VM location '$(vmLocation)'. DES must be co-located with the Managed HSM."
                }

                Write-Host "##[section]Deploying Disk Encryption Set"
                Write-Host "DES Name: $desName"
                Write-Host "Resource Group: $resourceGroup"
                Write-Host "UAMI ID: $ccUamiId"
                Write-Host "Key URL: $keyUrl"
                Write-Host "DES Location: $desLocation"

                $templateFile = "$(System.DefaultWorkingDirectory)/ComponentLibrary/DiskEncryptionSet/main.bicep"
                $parametersFile = "$(System.DefaultWorkingDirectory)/ComponentLibrary/DiskEncryptionSet/main.parameters.json"

                if (-not (Test-Path $templateFile)) {
                  Write-Host "##vso[task.logissue type=error]Template file '$templateFile' not found."
                  exit 1
                }

                # Load the parameter file and set the hostpool tag dynamically
                $params = Get-Content $parametersFile -Raw | ConvertFrom-Json
                $params.parameters.diskEncryptionSetName.value = $desName
                $params.parameters.userAssignedIdentityId.value = $ccUamiId
                $params.parameters.keyUrl.value = $keyUrl
                $params.parameters.tags.value.hostpool = "$(hostpoolname)"

                $runtimeParametersFile = "$(Agent.TempDirectory)/des-parameters.json"
                $params | ConvertTo-Json -Depth 5 | Set-Content -Path $runtimeParametersFile -Encoding UTF8

                $ErrorActionPreference = 'Continue'
                $maxRetries = 3
                $retryDelay = 30
                $output = $null
                for ($attempt = 1; $attempt -le $maxRetries; $attempt++) {
                  Write-Host "Deployment attempt $attempt of $maxRetries..."
                  $output = az deployment group create `
                    --resource-group $resourceGroup `
                    --name "Deploy-DES-$(hostpoolname)-$(Build.BuildId)" `
                    --template-file $templateFile `
                    --parameters "@$runtimeParametersFile" `
                    --parameters location="$desLocation" 2>&1

                  if ($LASTEXITCODE -eq 0) {
                    Write-Host "✅ Deployment succeeded on attempt $attempt"
                    break
                  }

                  $outputStr = $output | Out-String
                  if ($outputStr -match "internal server error" -and $attempt -lt $maxRetries) {
                    Write-Host "##[warning]Transient internal server error on attempt $attempt. Retrying in $retryDelay seconds..."
                    Start-Sleep -Seconds $retryDelay
                    $retryDelay = $retryDelay * 2
                  } else {
                    Write-Host "##vso[task.logissue type=error]Failed to deploy Disk Encryption Set"
                    Write-Host "Error: $output"
                    exit 1
                  }
                }

                # Filter out any warning lines from Azure CLI output before parsing JSON
                $jsonOutput = ($output | Where-Object { $_ -notmatch "^WARNING:" -and $_ -ne "" }) -join "`n"
                $desOutput = $jsonOutput | ConvertFrom-Json
                $diskEncryptionSetId = $desOutput.properties.outputs.diskEncryptionSetId.value

                if ([string]::IsNullOrEmpty($diskEncryptionSetId)) {
                  Write-Host "##vso[task.logissue type=error]Disk Encryption Set deployment succeeded but output 'diskEncryptionSetId' is empty."
                  exit 1
                }

                Write-Host "✅ Disk Encryption Set deployed successfully"
                Write-Host "DES ID: $diskEncryptionSetId"
                Write-Host "##vso[task.setvariable variable=diskEncryptionSetId;isOutput=true]$diskEncryptionSetId"

  # Replacement workflow stages (only run for replace operations)
  - stage: DisableLogons_${{ parameters.deploymentIdentifier }}
    displayName: "Disable Logons on Hosts to Replace"
    condition: and(succeeded(), eq(variables.isReplaceOperation, true))
    dependsOn:
      - InitializeParameters_${{ parameters.deploymentIdentifier }}
      - RetrieveExistingResources_${{ parameters.deploymentIdentifier }}
    variables:
      subscriptionname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subscriptionname'] ]
      hostpoolname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolname'] ]
      hostpoolresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolresourcegroup'] ]
      hostsToProcess: $[ stageDependencies.RetrieveExistingResources_${{ parameters.deploymentIdentifier }}.RetrieveResources.outputs['existingResources.hostsToProcess'] ]
    jobs:
      - job: DisableLogons
        displayName: 'Disable New Sessions'
        steps:
          - task: AzureCLI@2
            displayName: "Disable Logons on Target Hosts"
            inputs:
              azureSubscription: '${{ parameters.serviceConnection }}'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Suppress Azure CLI warnings about updates
                $env:AZURE_CORE_COLLECT_TELEMETRY = "false"
                $ErrorActionPreference = 'Continue'
                
                az account set --subscription $(subscriptionname)
                
                # Install the desktop virtualization extension if not already installed
                Write-Host "Ensuring desktopvirtualization extension is installed..."
                try {
                    $null = az extension add --name desktopvirtualization --yes --allow-preview false 2>$null
                } catch {
                    # Ignore installation warnings
                }
                
                # Check if desktopvirtualization commands are available
                Write-Host "Checking available desktopvirtualization commands..."
                $useRestApi = $true
                try {
                    $helpTest = az desktopvirtualization 2>$null
                    if ($?) {
                        Write-Host "Azure CLI desktopvirtualization commands appear to be available"
                        $useRestApi = $false
                    }
                } catch {
                    Write-Host "##[warning]Azure CLI desktopvirtualization commands not available, will use REST API"
                }
                
                Write-Host "##[section]Disabling new sessions on hosts to be replaced"
                
                $hostsJson = '$(hostsToProcess)'
                $hosts = $hostsJson | ConvertFrom-Json
                
                $successCount = 0
                $failCount = 0
                
                foreach ($sessionHost in $hosts) {
                  $hostName = $sessionHost.name -split "/" | Select-Object -Last 1
                  Write-Host "Processing host: $hostName"
                  
                  # Always use REST API for reliability
                  try {
                    $resourceId = $sessionHost.resourceId
                    $apiVersion = "2023-09-05"
                    $uri = "${resourceId}?api-version=${apiVersion}"
                    
                    # Create the JSON body for the update - use a plain JSON string
                    # to avoid encoding issues with ConvertTo-Json and Out-File BOM
                    $body = '{"properties":{"allowNewSession":false}}'
                    
                    # Save body to temp file using ASCII/no-BOM encoding
                    # Windows PowerShell's Out-File -Encoding UTF8 adds a BOM which
                    # causes az rest to silently fail to parse the body
                    $tempBodyFile = [System.IO.Path]::GetTempFileName()
                    [System.IO.File]::WriteAllText($tempBodyFile, $body)
                    
                    Write-Host "  Using REST API to disable logons..."
                    $restResult = az rest --method PATCH --uri "$uri" --body "@$tempBodyFile" 2>&1
                    
                    if ($LASTEXITCODE -eq 0) {
                      # Verify the change was actually applied
                      $verifyResult = az rest --method GET --uri "$uri" -o json 2>$null
                      $verifyData = $verifyResult | ConvertFrom-Json
                      if ($verifyData.properties.allowNewSession -eq $false) {
                        Write-Host "  ✅ Successfully disabled logons on $hostName (verified)"
                        $successCount++
                      } else {
                        Write-Host "  ⚠️ REST API returned success but allowNewSession is still $($verifyData.properties.allowNewSession)"
                        Write-Host "  Retrying with inline body..."
                        $null = az rest --method PATCH --uri "$uri" --body "$body" 2>&1
                        if ($LASTEXITCODE -eq 0) {
                          Write-Host "  ✅ Retry succeeded"
                          $successCount++
                        } else {
                          Write-Host "  ❌ Retry also failed"
                          $failCount++
                        }
                      }
                    } else {
                      Write-Host "  ❌ Failed to disable logons on $hostName"
                      Write-Host "  Error: $restResult"
                      $failCount++
                    }
                    
                    Remove-Item $tempBodyFile -Force -ErrorAction SilentlyContinue
                  } catch {
                    Write-Host "  ❌ Error disabling logons on $hostName $_"
                    $failCount++
                  }
                }
                
                Write-Host ""
                Write-Host "##[section]Summary"
                Write-Host "✅ Successfully disabled: $successCount hosts"
                if ($failCount -gt 0) {
                  Write-Host "❌ Failed: $failCount hosts"
                  Write-Host "##vso[task.logissue type=warning]Failed to disable logons on $failCount hosts"
                }

  - stage: SendUserWarning_${{ parameters.deploymentIdentifier }}
    displayName: "Send Warning to Users"
    condition: and(succeeded(), eq(variables.isReplaceOperation, true))
    dependsOn:
      - InitializeParameters_${{ parameters.deploymentIdentifier }}
      - RetrieveExistingResources_${{ parameters.deploymentIdentifier }}
      - DisableLogons_${{ parameters.deploymentIdentifier }}
    variables:
      subscriptionname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subscriptionname'] ]
      hostpoolname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolname'] ]
      hostpoolresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolresourcegroup'] ]
      userWarningMessage: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.userWarningMessage'] ]
      warningDelayMinutes: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.warningDelayMinutes'] ]
      hostsToProcess: $[ stageDependencies.RetrieveExistingResources_${{ parameters.deploymentIdentifier }}.RetrieveResources.outputs['existingResources.hostsToProcess'] ]
    jobs:
      - job: SendWarning
        displayName: 'Notify Users'
        steps:
          - task: AzureCLI@2
            displayName: "Send Warning Messages to Users"
            inputs:
              azureSubscription: '${{ parameters.serviceConnection }}'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Suppress Azure CLI warnings
                $env:AZURE_CORE_COLLECT_TELEMETRY = "false"
                $ErrorActionPreference = 'Continue'
                
                az account set --subscription $(subscriptionname)
                
                # Create the actual warning message with time included
                $warningMinutes = $(warningDelayMinutes)
                $baseMessage = "$(userWarningMessage)"
                
                # Replace time placeholder in the message
                $actualWarningMessage = $baseMessage -replace '\{minutes\}', $warningMinutes
                $actualWarningMessage = $actualWarningMessage -replace '\{time\}', $warningMinutes
                
                # If no placeholder was found and no time is in the message, prepend it
                if ($actualWarningMessage -eq $baseMessage -and $baseMessage -notmatch '\d+\s*minute') {
                  $actualWarningMessage = "System maintenance will begin in $warningMinutes minutes. " + $baseMessage
                }
                
                Write-Host "##[section]Processing user notifications"
                Write-Host "Warning message: '$actualWarningMessage'"
                Write-Host "Warning delay: $warningMinutes minutes"
                
                $hostsJson = '$(hostsToProcess)'
                $hosts = $hostsJson | ConvertFrom-Json
                
                # Get active user sessions using REST API
                $activeSessions = @()
                $uniqueUsers = @{}
                
                foreach ($sessionHost in $hosts) {
                  $hostName = $sessionHost.name -split "/" | Select-Object -Last 1
                  Write-Host "Checking sessions on host: $hostName"
                  
                  try {
                    # Use REST API to get user sessions
                    $resourceId = $sessionHost.resourceId
                    $apiVersion = "2023-09-05"
                    $uri = "${resourceId}/userSessions?api-version=${apiVersion}"
                    
                    $sessionsResult = az rest --method GET --uri "$uri" 2>$null
                    
                    if ($LASTEXITCODE -eq 0 -and $sessionsResult) {
                      $sessionsData = $sessionsResult | ConvertFrom-Json
                      
                      if ($sessionsData.value) {
                        foreach ($session in $sessionsData.value) {
                          # Include both Active and Disconnected sessions
                          if ($session.properties.sessionState -eq 'Active' -or $session.properties.sessionState -eq 'Disconnected') {
                            $userPrincipalName = $session.properties.userPrincipalName
                            $sessionState = $session.properties.sessionState
                            $activeSessions += @{
                              userPrincipalName = $userPrincipalName
                              sessionId = $session.name
                              hostName = $hostName
                              state = $sessionState
                            }
                            
                            # Track unique users
                            if (-not $uniqueUsers.ContainsKey($userPrincipalName)) {
                              $uniqueUsers[$userPrincipalName] = @()
                            }
                            $uniqueUsers[$userPrincipalName] += "$hostName ($sessionState)"
                          }
                        }
                      }
                    }
                  } catch {
                    Write-Host "##vso[task.logissue type=warning]Error retrieving sessions for $hostName $_"
                  }
                }
                
                Write-Host ""
                Write-Host "##[section]Session Summary"
                Write-Host "Total sessions (Active/Disconnected): $($activeSessions.Count)"
                Write-Host "Unique users affected: $($uniqueUsers.Count)"
                
                if ($uniqueUsers.Count -gt 0) {
                  Write-Host ""
                  Write-Host "Affected users:"
                  foreach ($user in $uniqueUsers.Keys) {
                    $hostsForUser = $uniqueUsers[$user] -join ", "
                    Write-Host "  - $user (on: $hostsForUser)"
                  }
                  
                  Write-Host ""
                  Write-Host "##[warning]Note: Actual user notification implementation required"
                  Write-Host "Message to be sent: '$actualWarningMessage'"
                  
                  # Create a notification file for audit purposes
                  $notificationFile = "user-notifications-$(Build.BuildId).json"
                  $notificationFilePath = Join-Path "$(System.DefaultWorkingDirectory)" $notificationFile
                  
                  $notificationContent = @{
                    timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
                    buildId = "$(Build.BuildId)"
                    hostpool = "$(hostpoolname)"
                    message = $actualWarningMessage
                    warningDelayMinutes = $warningMinutes
                    affectedUsers = $uniqueUsers
                  } | ConvertTo-Json -Depth 10
                  
                  # Save the file
                  $notificationContent | Out-File -FilePath $notificationFilePath -Encoding UTF8
                  
                  if (Test-Path $notificationFilePath) {
                    Write-Host ""
                    Write-Host "Notification file created at: $notificationFilePath"
                    Write-Host "Uploading as pipeline artifact..."
                    Write-Host "##vso[task.uploadfile]$notificationFilePath"
                  } else {
                    Write-Host "##vso[task.logissue type=warning]Failed to create notification file"
                  }
                  
                } else {
                  Write-Host ""
                  Write-Host "##[section]No active user sessions found. No warnings needed."
                }
                
                # Wait for the specified warning delay
                if ($activeSessions.Count -gt 0 -and $warningMinutes -gt 0) {
                  Write-Host ""
                  Write-Host "##[section]Waiting $warningMinutes minutes before proceeding to logoff users..."
                  
                  $endTime = (Get-Date).AddMinutes($warningMinutes)
                  $totalSeconds = $warningMinutes * 60
                  
                  for ($i = 0; $i -lt $totalSeconds; $i += 30) {
                    $remaining = $endTime - (Get-Date)
                    if ($remaining.TotalSeconds -gt 0) {
                      Write-Host "Time remaining: $([math]::Round($remaining.TotalMinutes, 1)) minutes..."
                      Start-Sleep -Seconds ([math]::Min(30, $remaining.TotalSeconds))
                    }
                  }
                  
                  Write-Host "Warning period complete. Proceeding with user logoff..."
                }

  - stage: LogoffUsers_${{ parameters.deploymentIdentifier }}
    displayName: "Logoff Users from Target Hosts"
    condition: and(succeeded(), eq(variables.isReplaceOperation, true))
    dependsOn:
      - InitializeParameters_${{ parameters.deploymentIdentifier }}
      - RetrieveExistingResources_${{ parameters.deploymentIdentifier }}
      - DisableLogons_${{ parameters.deploymentIdentifier }}
      - SendUserWarning_${{ parameters.deploymentIdentifier }}
    variables:
      subscriptionname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subscriptionname'] ]
      hostpoolname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolname'] ]
      hostpoolresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolresourcegroup'] ]
      hostsToProcess: $[ stageDependencies.RetrieveExistingResources_${{ parameters.deploymentIdentifier }}.RetrieveResources.outputs['existingResources.hostsToProcess'] ]
    jobs:
      - job: LogoffUsers
        displayName: 'Force Logoff Users'
        steps:
          - task: AzureCLI@2
            displayName: "Force Logoff All Users"
            inputs:
              azureSubscription: '${{ parameters.serviceConnection }}'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Suppress Azure CLI warnings
                $env:AZURE_CORE_COLLECT_TELEMETRY = "false"
                $ErrorActionPreference = 'Continue'
                
                az account set --subscription $(subscriptionname)
                
                Write-Host "##[section]Logging off all users from target hosts"
                
                $hostsJson = '$(hostsToProcess)'
                $hosts = $hostsJson | ConvertFrom-Json
                
                $totalLoggedOff = 0
                $totalFailed = 0
                
                foreach ($sessionHost in $hosts) {
                  $hostName = $sessionHost.name -split "/" | Select-Object -Last 1
                  Write-Host ""
                  Write-Host "Processing host: $hostName"
                  
                  try {
                    # Get all user sessions using REST API
                    $resourceId = $sessionHost.resourceId
                    $apiVersion = "2023-09-05"
                    $uri = "${resourceId}/userSessions?api-version=${apiVersion}"
                    
                    $sessionsResult = az rest --method GET --uri "$uri" 2>$null
                    
                    if ($LASTEXITCODE -eq 0 -and $sessionsResult) {
                      $sessionsData = $sessionsResult | ConvertFrom-Json
                      
                      if ($sessionsData.value) {
                        # Include both Active and Disconnected sessions
                        $sessionsToTerminate = $sessionsData.value | Where-Object { 
                          $_.properties.sessionState -eq 'Active' -or $_.properties.sessionState -eq 'Disconnected' 
                        }
                        
                        if ($sessionsToTerminate.Count -gt 0) {
                          Write-Host "Found $($sessionsToTerminate.Count) sessions to terminate (Active/Disconnected)"
                          
                          foreach ($session in $sessionsToTerminate) {
                            $sessionId = $session.name -split "/" | Select-Object -Last 1
                            $userPrincipalName = $session.properties.userPrincipalName
                            $sessionState = $session.properties.sessionState
                            Write-Host "  Terminating $sessionState session for user $userPrincipalName (Session: $sessionId)"
                            
                            try {
                              # Use REST API to delete the session
                              $deleteUri = "${resourceId}/userSessions/${sessionId}?api-version=${apiVersion}&force=true"
                              $deleteResult = az rest --method DELETE --uri "$deleteUri" 2>&1
                              
                              if ($LASTEXITCODE -eq 0 -or $deleteResult -eq $null -or $deleteResult -eq "") {
                                Write-Host "    ✅ Successfully terminated session"
                                $totalLoggedOff++
                              } else {
                                # Double-check if the session is actually gone
                                Start-Sleep -Seconds 2
                                $checkUri = "${resourceId}/userSessions/${sessionId}?api-version=${apiVersion}"
                                $checkResult = az rest --method GET --uri "$checkUri" 2>&1
                                
                                if ($checkResult -match "NotFound" -or $checkResult -match "404") {
                                  Write-Host "    ✅ Session terminated (verified)"
                                  $totalLoggedOff++
                                } else {
                                  Write-Host "    ❌ Failed to terminate session"
                                  $totalFailed++
                                }
                              }
                            } catch {
                              Write-Host "    ❌ Error: $_"
                              $totalFailed++
                            }
                          }
                        } else {
                          Write-Host "No active sessions on this host"
                        }
                      } else {
                        Write-Host "No user sessions found on $hostName"
                      }
                    }
                  } catch {
                    Write-Host "##vso[task.logissue type=warning]Error retrieving sessions for $hostName $_"
                  }
                }
                
                Write-Host ""
                Write-Host "##[section]Termination Summary"
                Write-Host "✅ Successfully terminated: $totalLoggedOff sessions"
                if ($totalFailed -gt 0) {
                  Write-Host "⚠️ Could not confirm termination of: $totalFailed sessions"
                  Write-Host "##vso[task.logissue type=warning]Could not confirm termination of $totalFailed sessions"
                  
                  if ($totalLoggedOff -eq 0 -and $totalFailed -gt 5) {
                    Write-Host "##vso[task.logissue type=error]Failed to terminate all sessions"
                    exit 1
                  } else {
                    Write-Host "Proceeding with shutdown as sessions appear to be cleared"
                  }
                }

  - stage: ShutdownAndDeallocateHosts_${{ parameters.deploymentIdentifier }}
    displayName: "Shutdown and Deallocate Target Hosts"
    condition: and(succeeded(), eq(variables.isReplaceOperation, true))
    dependsOn:
      - InitializeParameters_${{ parameters.deploymentIdentifier }}
      - RetrieveExistingResources_${{ parameters.deploymentIdentifier }}
      - LogoffUsers_${{ parameters.deploymentIdentifier }}
    variables:
      subscriptionname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subscriptionname'] ]
      hostpoolresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolresourcegroup'] ]
      hostsresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostsresourcegroup'] ]
      hostsToProcess: $[ stageDependencies.RetrieveExistingResources_${{ parameters.deploymentIdentifier }}.RetrieveResources.outputs['existingResources.hostsToProcess'] ]
    jobs:
      - job: ShutdownHosts
        displayName: 'Shutdown VMs'
        steps:
          - task: PowerShell@2
            displayName: "Parse VM Names from Hosts"
            name: parseVMs
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Parsing host information"
                $hostsJson = '$(hostsToProcess)'
                Write-Host "Raw JSON length: $($hostsJson.Length)"
                
                $hosts = $hostsJson | ConvertFrom-Json
                Write-Host "Found $($hosts.Count) hosts to process"
                
                $vmNamesList = @()
                foreach ($sessionHost in $hosts) {
                    $fullName = $sessionHost.name
                    $parts = $fullName -split "/"
                    $hostName = $parts[$parts.Length - 1]
                    $vmName = $hostName -split "\." | Select-Object -First 1
                    Write-Host "Extracted VM name: $vmName"
                    $vmNamesList += $vmName
                }
                
                $vmNamesString = $vmNamesList -join ","
                Write-Host "VM names to process: $vmNamesString"
                Write-Host "##vso[task.setvariable variable=vmList]$vmNamesString"

          - task: AzureCLI@2
            displayName: "Stop VMs"
            inputs:
              azureSubscription: '${{ parameters.serviceConnection }}'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $ErrorActionPreference = 'Continue'
                az account set --subscription $(subscriptionname)
                
                Write-Host "Stopping VMs in resource group: $(hostsresourcegroup)"
                $vmList = "$(vmList)"
                
                if ([string]::IsNullOrEmpty($vmList)) {
                    Write-Host "No VMs to process"
                    exit 0
                }
                
                $VMS = $vmList -split ","
                
                foreach ($vm in $VMS) {
                    Write-Host "Stopping VM: $vm"
                    az vm stop --resource-group "$(hostsresourcegroup)" --name "$vm" --no-wait 2>&1 | Out-Null
                    if ($LASTEXITCODE -eq 0) {
                        Write-Host "  Stop command sent successfully"
                    } else {
                        Write-Host "  Warning: VM may already be stopped or doesn't exist"
                    }
                }
                
                Write-Host "Waiting 30 seconds for stop operations"
                Start-Sleep -Seconds 30
                
                # Explicitly exit with success
                exit 0

          - task: AzureCLI@2
            displayName: "Deallocate VMs"
            inputs:
              azureSubscription: '${{ parameters.serviceConnection }}'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $ErrorActionPreference = 'Continue'
                az account set --subscription $(subscriptionname)
                
                Write-Host "Deallocating VMs in resource group: $(hostsresourcegroup)"
                $vmList = "$(vmList)"
                
                if ([string]::IsNullOrEmpty($vmList)) {
                    Write-Host "No VMs to process"
                    exit 0
                }
                
                $VMS = $vmList -split ","
                
                foreach ($vm in $VMS) {
                    Write-Host "Deallocating VM: $vm"
                    az vm deallocate --resource-group "$(hostsresourcegroup)" --name "$vm" --no-wait 2>&1 | Out-Null
                    if ($LASTEXITCODE -eq 0) {
                        Write-Host "  Deallocate command sent successfully"
                    } else {
                        Write-Host "  Warning: VM may already be deallocated or doesn't exist"
                    }
                }
                
                Write-Host "Waiting 60 seconds for deallocation operations"
                Start-Sleep -Seconds 60
                
                # Explicitly exit with success
                exit 0

          - task: AzureCLI@2
            displayName: "Verify and Output VM Names"
            name: shutdownHosts
            inputs:
              azureSubscription: '${{ parameters.serviceConnection }}'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $ErrorActionPreference = 'Continue'
                az account set --subscription $(subscriptionname)
                
                Write-Host "Verifying VM states and collecting names"
                $vmList = "$(vmList)"
                
                if ([string]::IsNullOrEmpty($vmList)) {
                    Write-Host "##vso[task.setvariable variable=vmNames;isOutput=true][]"
                    exit 0
                }
                
                $VMS = $vmList -split ","
                $existingVMs = @()
                
                foreach ($vm in $VMS) {
                    Write-Host "Checking VM: $vm"
                    
                    # Check if VM exists
                    $vmExists = $null
                    $vmExists = az vm show --resource-group "$(hostsresourcegroup)" --name "$vm" --query "name" -o tsv 2>$null
                    
                    if (-not [string]::IsNullOrEmpty($vmExists)) {
                        Write-Host "  VM exists: $vm"
                        
                        # Get power state
                        $powerState = $null
                        $powerState = az vm show --resource-group "$(hostsresourcegroup)" --name "$vm" --show-details --query "powerState" -o tsv 2>$null
                        if ([string]::IsNullOrEmpty($powerState)) {
                            $powerState = "unknown"
                        }
                        Write-Host "  Power state: $powerState"
                        
                        $existingVMs += $vm
                    }
                    else {
                        Write-Host "  VM does not exist: $vm"
                    }
                }
                
                # Create JSON array
                if ($existingVMs.Count -gt 0) {
                    $vmNamesJson = $existingVMs | ConvertTo-Json -Compress
                    if ($existingVMs.Count -eq 1) {
                        # ConvertTo-Json doesn't create an array for single items
                        $vmNamesJson = "[$vmNamesJson]"
                    }
                }
                else {
                    $vmNamesJson = "[]"
                }
                
                Write-Host "VM names JSON: $vmNamesJson"
                Write-Host "##vso[task.setvariable variable=vmNames;isOutput=true]$vmNamesJson"
                
                Write-Host "Shutdown and deallocation completed"
                
                # Explicitly exit with success
                exit 0

  - stage: ChangeDiskType_${{ parameters.deploymentIdentifier }}
    displayName: "Change OS Disks to Standard HDD"
    condition: and(succeeded(), eq(variables.isReplaceOperation, true))
    dependsOn:
      - InitializeParameters_${{ parameters.deploymentIdentifier }}
      - ShutdownAndDeallocateHosts_${{ parameters.deploymentIdentifier }}
    variables:
      subscriptionname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subscriptionname'] ]
      hostpoolresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolresourcegroup'] ]
      hostsresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostsresourcegroup'] ]
      vmNames: $[ stageDependencies.ShutdownAndDeallocateHosts_${{ parameters.deploymentIdentifier }}.ShutdownHosts.outputs['shutdownHosts.vmNames'] ]
    jobs:
      - job: ChangeDiskType
        displayName: 'Optimize Disk Costs'
        continueOnError: true
        steps:
          - task: AzureCLI@2
            displayName: "Change OS Disk Type to Standard HDD"
            continueOnError: true
            inputs:
              azureSubscription: '${{ parameters.serviceConnection }}'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $ErrorActionPreference = 'Continue'
                az account set --subscription $(subscriptionname)
                
                Write-Host "##[section]Changing OS disk type to Standard_LRS for cost optimization"
                Write-Host "Note: This may fail if the service principal lacks cross-subscription permissions"
                Write-Host ""
                
                $vmNamesJson = '$(vmNames)'
                
                # Check if we have any VMs to process
                if ([string]::IsNullOrEmpty($vmNamesJson)) {
                    Write-Host "##[warning]No VMs to process"
                    exit 0
                }
                
                if ($vmNamesJson -eq '[]') {
                    Write-Host "##[warning]Empty VM array"
                    exit 0
                }
                
                # Parse VM names
                $vmNames = @()
                try {
                    $vmNames = $vmNamesJson | ConvertFrom-Json
                } catch {
                    Write-Host "##[warning]Failed to parse VM names JSON"
                    exit 0
                }
                
                if ($vmNames.Count -eq 0) {
                    Write-Host "##[warning]No VMs in array"
                    exit 0
                }
                
                Write-Host "Processing $($vmNames.Count) VMs for disk optimization"
                
                $successCount = 0
                $alreadyOptimalCount = 0
                $failCount = 0
                
                foreach ($vmName in $vmNames) {
                    Write-Host ""
                    Write-Host "Processing VM: $vmName"
                    
                    # Verify VM is deallocated before changing disk type
                    $powerState = az vm show --resource-group "$(hostsresourcegroup)" --name $vmName --show-details --query "powerState" -o tsv 2>$null
                    if ($powerState -and $powerState -ne "VM deallocated") {
                        Write-Host "  [SKIP] VM power state is '$powerState' - must be deallocated to change disk type"
                        $failCount++
                        continue
                    }
                    
                    # Get OS disk name
                    $osDiskName = az vm show --resource-group "$(hostsresourcegroup)" --name $vmName --query "storageProfile.osDisk.name" -o tsv 2>$null
                    
                    if ([string]::IsNullOrEmpty($osDiskName)) {
                        Write-Host "  [FAIL] Could not find OS disk for VM"
                        $failCount++
                        continue
                    }
                    
                    Write-Host "  OS Disk: $osDiskName"
                    
                    # Get current disk type
                    $currentSku = az disk show --resource-group "$(hostsresourcegroup)" --name $osDiskName --query "sku.name" -o tsv 2>$null
                    Write-Host "  Current disk type: $currentSku"
                    
                    # Determine target SKU based on current disk redundancy
                    # ZRS disks cannot be directly changed to LRS - Azure does not support cross-redundancy SKU changes
                    # For ZRS disks: StandardSSD_ZRS is already the cheapest ZRS tier, skip
                    # For LRS disks: downgrade to Standard_LRS (Standard HDD) for cost savings
                    $isZrs = $currentSku -like "*_ZRS"
                    
                    if ($isZrs) {
                        # StandardSSD_ZRS is already the cheapest ZRS tier available
                        # Premium_ZRS -> StandardSSD_ZRS is the only useful downgrade
                        if ($currentSku -eq "StandardSSD_ZRS") {
                            Write-Host "  [OK] Disk is already StandardSSD_ZRS (cheapest ZRS tier) - no downgrade possible"
                            $alreadyOptimalCount++
                            continue
                        }
                        $targetSku = "StandardSSD_ZRS"
                    } else {
                        # LRS disks: downgrade to Standard_LRS (Standard HDD)
                        if ($currentSku -eq "Standard_LRS") {
                            Write-Host "  [OK] Disk is already Standard_LRS (cheapest tier)"
                            $alreadyOptimalCount++
                            continue
                        }
                        $targetSku = "Standard_LRS"
                    }
                    
                    # Try to change disk type
                    Write-Host "  Changing disk type from $currentSku to $targetSku..."
                    $output = az disk update --resource-group "$(hostsresourcegroup)" --name $osDiskName --set sku.name=$targetSku 2>&1
                    
                    if ($LASTEXITCODE -eq 0) {
                        Write-Host "  [OK] Successfully changed disk type to $targetSku"
                        $successCount++
                    } else {
                        $errorMsg = ($output | Out-String).Trim()
                        if ($errorMsg -match "LinkedAuthorizationFailed") {
                            Write-Host "  [WARN] Permission issue: Service principal lacks cross-subscription gallery access"
                            Write-Host "  This is expected when disks are created from images in another subscription"
                        } else {
                            Write-Host "  [FAIL] Failed to change disk type"
                            Write-Host "  Error: $errorMsg"
                        }
                        $failCount++
                    }
                }
                
                Write-Host ""
                Write-Host "##[section]Disk Optimization Summary"
                Write-Host "Successfully changed: $successCount disks"
                Write-Host "Already optimal: $alreadyOptimalCount disks"
                if ($failCount -gt 0) {
                    Write-Host "Could not change: $failCount disks"
                    Write-Host ""
                    Write-Host "##[warning]Some disks could not be changed."
                    Write-Host "##[warning]The deployment will continue with existing disk types."
                }
                
                # Always exit with success to allow pipeline to continue
                exit 0

