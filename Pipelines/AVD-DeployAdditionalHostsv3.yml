  # Deploy new hosts stage (for both add and replace operations)
  - stage: DeployNewSessionHosts_${{ parameters.deploymentIdentifier }}
    displayName: "Deploy New Session Hosts"
    condition: not(failed())
    dependsOn:
      - InitializeParameters_${{ parameters.deploymentIdentifier }}
      - RetrieveExistingResources_${{ parameters.deploymentIdentifier }}
      # - CleanupAVDDevices_${{ parameters.deploymentIdentifier }}  # Temporarily disabled
      - ${{ if eq(parameters.operationType, 'replace') }}:
        - ChangeDiskType_${{ parameters.deploymentIdentifier }}
      - ${{ if eq(parameters.confidentialCompute, true) }}:
        - RegisterCCFeatures_${{ parameters.deploymentIdentifier }}
      - ${{ if and(eq(parameters.confidentialCompute, true), eq(parameters.customerManagedKeys, true)) }}:
        - DeployDiskEncryptionSet_${{ parameters.deploymentIdentifier }}
    variables:
      subscriptionname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subscriptionname'] ]
      location: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.location'] ]
      vmLocation: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.vmLocation'] ]
      hostpoolname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolname'] ]
      hostpoolresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolresourcegroup'] ]
      hostsresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostsresourcegroup'] ]
      vmSize: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.vmSize'] ]
      vmNamePrefix: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.vmNamePrefix'] ]
      subnetId: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subnetId'] ]
      DomainJoinKeyVaultID: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.DomainJoinKeyVaultID'] ]
      startingHostNumber: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.startingHostNumber'] ]
      additionalHostCount: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.additionalHostCount'] ]
      operationType: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.operationType'] ]
      hostPoolId: $[ stageDependencies.RetrieveExistingResources_${{ parameters.deploymentIdentifier }}.RetrieveResources.outputs['existingResources.hostPoolId'] ]
      keyVaultId: $[ stageDependencies.RetrieveExistingResources_${{ parameters.deploymentIdentifier }}.RetrieveResources.outputs['existingResources.keyVaultId'] ]
      managedIdentityId: $[ stageDependencies.RetrieveExistingResources_${{ parameters.deploymentIdentifier }}.RetrieveResources.outputs['existingResources.managedIdentityId'] ]
      dataCollectionRuleId: $[ stageDependencies.RetrieveExistingResources_${{ parameters.deploymentIdentifier }}.RetrieveResources.outputs['existingResources.dataCollectionRuleId'] ]
      SharedImageId: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.SharedImageId'] ]
      imagePublisher: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.imagePublisher'] ]
      imageOffer: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.imageOffer'] ]
      imageSku: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.imageSku'] ]
      imageVersion: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.imageVersion'] ]
      confidentialCompute: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.confidentialCompute'] ]
      customerManagedKeys: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.customerManagedKeys'] ]
      domainJoinType: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.domainJoinType'] ]
      isEntraJoin: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.isEntraJoin'] ]
      diskEncryptionSetId: $[ stageDependencies.DeployDiskEncryptionSet_${{ parameters.deploymentIdentifier }}.Deploy.outputs['deployDES.diskEncryptionSetId'] ]
    jobs:
      - job: Deploy
        displayName: 'Deploy VMs'
        steps:
          - task: AzureCLI@2
            displayName: "Generate Host Pool Registration Token"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                $ErrorActionPreference = 'Continue'
                $WarningPreference = 'SilentlyContinue'
                
                $env:AZURE_CORE_COLLECT_TELEMETRY = "false"
                
                az account set --subscription $(subscriptionname)
                
                Write-Host "##[section]Generating registration token for host pool: $(hostpoolname)"
                
                # Calculate expiration time (24 hours from now)
                $expirationTime = (Get-Date).AddHours(24).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffffffZ")
                
                Write-Host "Token expiration time: $expirationTime"
                
                # Update the host pool with a new registration token using REST API
                Write-Host "Generating new registration token using REST API..."
                
                $subscriptionId = az account show --query "id" -o tsv 2>$null
                if (-not $subscriptionId) {
                    $subscriptionId = "$(subscriptionname)"
                }
                
                $apiVersion = "2023-09-05"
                $hostPoolUri = "https://management.azure.com/subscriptions/${subscriptionId}/resourceGroups/$(hostpoolresourcegroup)/providers/Microsoft.DesktopVirtualization/hostPools/$(hostpoolname)?api-version=${apiVersion}"
                
                $body = @{
                    properties = @{
                        registrationInfo = @{
                            expirationTime = $expirationTime
                            registrationTokenOperation = "Update"
                        }
                    }
                } | ConvertTo-Json -Depth 10
                
                $tempBodyFile = [System.IO.Path]::GetTempFileName()
                [System.IO.File]::WriteAllText($tempBodyFile, $body)
                
                $null = az rest --method PATCH --uri "$hostPoolUri" --body "@$tempBodyFile" 2>$null
                
                Remove-Item $tempBodyFile -Force -ErrorAction SilentlyContinue
                
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##vso[task.logissue type=error]Failed to generate registration token"
                  exit 1
                } else {
                  Write-Host "Successfully generated new registration token"
                }
                
                # Wait a moment for the token to be ready
                Start-Sleep -Seconds 5
                
          - task: AzureCLI@2
            displayName: "Cleanup Existing VMs from Failed Deployment"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              failOnStandardError: false
              inlineScript: |
                $ErrorActionPreference = 'Continue'
                $WarningPreference = 'SilentlyContinue'
                
                az account set --subscription $(subscriptionname)
                
                $deploymentActivation = "${{ parameters.DeploymentActivation }}".ToLower()
                $originalVmNamePrefix = "$(vmNamePrefix)"
                $vmNamePrefixWithActivation = "${originalVmNamePrefix}-${deploymentActivation}"
                $startingNumber = [int]"$(startingHostNumber)"
                $hostCount = [int]"$(additionalHostCount)"
                $rg = "$(hostsresourcegroup)"
                
                Write-Host "##[section]Checking for existing VMs from previous failed deployment"
                Write-Host "Resource Group: $rg"
                Write-Host "VM Name Prefix: $vmNamePrefixWithActivation"
                
                # Check if resource group exists first
                $rgExists = az group exists --name $rg --output tsv 2>$null
                if ($rgExists -ne "true") {
                    Write-Host "Resource group '$rg' does not exist yet - nothing to clean up"
                    exit 0
                }
                
                # Build list of expected VM names
                $expectedVMs = @()
                for ($i = 0; $i -lt $hostCount; $i++) {
                    $vmNumber = $startingNumber + $i
                    $expectedVMs += "${vmNamePrefixWithActivation}$('{0:d2}' -f $vmNumber)"
                }
                
                Write-Host "Checking for VMs: $($expectedVMs -join ', ')"
                
                # Get existing VMs that match our target names
                $existingVMs = az vm list --resource-group $rg --query "[?starts_with(name, '$vmNamePrefixWithActivation')].{name:name, provisioningState:provisioningState}" --output json 2>$null | ConvertFrom-Json
                
                if (-not $existingVMs -or $existingVMs.Count -eq 0) {
                    Write-Host "[OK] No existing VMs found with prefix '$vmNamePrefixWithActivation' - clean deployment"
                    exit 0
                }
                
                Write-Host "[WARNING] Found $($existingVMs.Count) existing VM(s) from a previous deployment attempt:"
                foreach ($vm in $existingVMs) {
                    Write-Host "  - $($vm.name) (provisioning: $($vm.provisioningState))"
                }
                
                # Delete VMs, their OS disks, NICs, and remove from host pool
                Write-Host ""
                Write-Host "##[section]Deleting existing VMs, disks, and NICs to allow clean redeployment..."
                
                foreach ($vm in $existingVMs) {
                    $vmName = $vm.name
                    Write-Host ""
                    Write-Host "--- Processing $vmName ---"
                    
                    # Get VM details (OS disk, NICs) before deleting
                    $vmDetail = az vm show --resource-group $rg --name $vmName --output json 2>$null | ConvertFrom-Json
                    
                    $osDiskName = $null
                    $nicIds = @()
                    
                    if ($vmDetail) {
                        $osDiskName = $vmDetail.storageProfile.osDisk.name
                        if ($vmDetail.networkProfile.networkInterfaces) {
                            $nicIds = $vmDetail.networkProfile.networkInterfaces | ForEach-Object { $_.id }
                        }
                        Write-Host "  OS Disk: $osDiskName"
                        Write-Host "  NICs: $($nicIds.Count)"
                    }
                    
                    # Delete the VM (this does NOT delete the disk or NIC by default)
                    Write-Host "  Deleting VM $vmName..."
                    az vm delete --resource-group $rg --name $vmName --yes --force-deletion true --no-wait false 2>$null
                    if ($LASTEXITCODE -eq 0) {
                        Write-Host "  [OK] VM deleted"
                    } else {
                        Write-Host "  ##[warning]Failed to delete VM $vmName (exit code: $LASTEXITCODE)"
                    }
                    
                    # Remove session host registration from the host pool
                    Write-Host "  Removing session host from host pool $(hostpoolname)..."
                    try {
                        $subscriptionId = az account show --query "id" -o tsv 2>$null
                        $apiVersion = "2023-09-05"
                        $sessionHostsUri = "https://management.azure.com/subscriptions/${subscriptionId}/resourceGroups/$(hostpoolresourcegroup)/providers/Microsoft.DesktopVirtualization/hostPools/$(hostpoolname)/sessionHosts?api-version=${apiVersion}"
                        
                        $allHosts = az rest --method GET --uri "$sessionHostsUri" -o json 2>$null | ConvertFrom-Json
                        
                        # Find the session host matching this VM name (session host name format: hostpool/vmname.domain)
                        $matchingHost = $allHosts.value | Where-Object {
                            $shName = $_.name -split "/" | Select-Object -Last 1
                            $shVmName = ($shName -split "\.")[0]
                            $shVmName -eq $vmName
                        }
                        
                        if ($matchingHost) {
                            $sessionHostName = $matchingHost.name -split "/" | Select-Object -Last 1
                            $deleteUri = "$($matchingHost.id)?api-version=${apiVersion}"
                            az rest --method DELETE --uri "$deleteUri" 2>$null
                            if ($LASTEXITCODE -eq 0) {
                                Write-Host "  [OK] Session host '$sessionHostName' removed from host pool"
                            } else {
                                Write-Host "  ##[warning]Failed to remove session host '$sessionHostName' from host pool (exit code: $LASTEXITCODE)"
                            }
                        } else {
                            Write-Host "  [INFO] No matching session host found in host pool for '$vmName' - skipping"
                        }
                    } catch {
                        Write-Host "  ##[warning]Error removing session host from host pool: $_"
                    }
                    
                    # Delete the OS disk
                    if ($osDiskName) {
                        Write-Host "  Deleting OS disk $osDiskName..."
                        az disk delete --resource-group $rg --name $osDiskName --yes --no-wait false 2>$null
                        if ($LASTEXITCODE -eq 0) {
                            Write-Host "  [OK] OS disk deleted"
                        } else {
                            Write-Host "  ##[warning]Failed to delete disk $osDiskName (exit code: $LASTEXITCODE)"
                        }
                    }
                    
                    # Delete NICs
                    foreach ($nicId in $nicIds) {
                        $nicName = ($nicId -split '/')[-1]
                        Write-Host "  Deleting NIC $nicName..."
                        az network nic delete --ids $nicId 2>$null
                        if ($LASTEXITCODE -eq 0) {
                            Write-Host "  [OK] NIC deleted"
                        } else {
                            Write-Host "  ##[warning]Failed to delete NIC $nicName (exit code: $LASTEXITCODE)"
                        }
                    }
                    
                    Write-Host "  [OK] Cleanup complete for $vmName"
                }
                
                Write-Host ""
                Write-Host "[OK] All existing VMs cleaned up - deployment can proceed with fresh resources"
                
                exit 0
                
          - task: AzureCLI@2
            displayName: "Deploy New Session Hosts"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              failOnStandardError: false
              inlineScript: |
                az account set --subscription $(subscriptionname)
                
                $operationType = "$(operationType)"
                $deploymentActivation = "${{ parameters.DeploymentActivation }}".ToLower()
                $startingNumber = [int]"$(startingHostNumber)"
                $hostCount = [int]"$(additionalHostCount)"
                $isConfidentialCompute = "$(confidentialCompute)" -eq "True"
                
                Write-Host "##[section]Deploying $operationType Session Hosts"
                Write-Host "Deployment Activation: ${{ parameters.DeploymentActivation }}"
                Write-Host "Host Count: $hostCount"
                Write-Host "Host Pool: $(hostpoolname)"
                Write-Host "Confidential Compute: $isConfidentialCompute"
                
                # Create VM name prefix with deployment activation
                $originalVmNamePrefix = "$(vmNamePrefix)"
                $vmNamePrefixWithActivation = "${originalVmNamePrefix}-${deploymentActivation}"
                
                Write-Host "Original VM Name Prefix: $originalVmNamePrefix"
                Write-Host "VM Name Prefix with Activation: $vmNamePrefixWithActivation"
                Write-Host "Starting Number: $startingNumber"
                Write-Host "VM Size: $(vmSize)"
                Write-Host "Shared Image ID: $(SharedImageId)"
                
                $sharedImageIdValue = "$(SharedImageId)"
                if ([string]::IsNullOrEmpty($sharedImageIdValue)) {
                  Write-Host "Image Source: Marketplace ($(imagePublisher)/$(imageOffer)/$(imageSku)/$(imageVersion))"
                } else {
                  Write-Host "Image Source: Shared Image Gallery"
                }
                
                # Select the appropriate template and parameter file based on confidential compute setting
                if ($isConfidentialCompute) {
                  Write-Host "##[section]Using Confidential Compute template"
                  $templatefile = "$(System.DefaultWorkingDirectory)/ComponentLibrary/AzureVirtualDesktop/SessionHost/main-cc.bicep"
                  $parameterfile = "$(System.DefaultWorkingDirectory)/Environments/$(subscriptionname)/$(hostpoolname)/SessionHost/main-cc.parameters.json"
                  
                  # Fall back to component library parameter file if environment-specific one doesn't exist
                  if (-not (Test-Path $parameterfile)) {
                    Write-Host "Environment-specific CC parameter file not found, using component library defaults"
                    $parameterfile = "$(System.DefaultWorkingDirectory)/ComponentLibrary/AzureVirtualDesktop/SessionHost/main-cc.parameters.json"
                  }
                } else {
                  Write-Host "##[section]Using Standard (Trusted Launch) template"
                  $templatefile = "$(System.DefaultWorkingDirectory)/ComponentLibrary/AzureVirtualDesktop/SessionHost/main.bicep"
                  $parameterfile = "$(System.DefaultWorkingDirectory)/Environments/$(subscriptionname)/$(hostpoolname)/SessionHost/main.parameters.json"
                }
                
                if (-not (Test-Path $templatefile)) {
                  Write-Host "##vso[task.logissue type=error]Template file '$templatefile' not found."
                  exit 1
                }
                
                if (-not (Test-Path $parameterfile)) {
                  Write-Host "##vso[task.logissue type=error]Parameter file not found at: $parameterfile"
                  Write-Host "This file is required as it contains KeyVault secret names and other deployment settings."
                  exit 1
                }
                
                $ErrorActionPreference = 'Continue'
                $WarningPreference = 'SilentlyContinue'
                
                # Get timestamp for tags
                $timestamp = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
                $deploymentId = "$(Build.BuildId)"
                
                Write-Host "Reading parameters from existing file..."
                $existingParams = Get-Content $parameterfile -Raw | ConvertFrom-Json
                
                # Build deployment parameters
                $deploymentParams = @{}
                
                # Copy ALL parameters from the existing file
                foreach ($param in $existingParams.parameters.PSObject.Properties) {
                  $paramName = $param.Name
                  $paramValue = $param.Value.value
                  $deploymentParams[$paramName] = $paramValue
                }
                
                # Override specific parameters
                $deploymentParams["hostpoolName"] = "$(hostpoolname)"
                $deploymentParams["hostpoolResourceGroup"] = "$(hostpoolresourcegroup)"
                $deploymentParams["location"] = "$(vmLocation)"
                $deploymentParams["sessionHostCount"] = $hostCount
                $deploymentParams["startingIndex"] = $startingNumber
                $deploymentParams["vmSize"] = "$(vmSize)"
                $deploymentParams["vmNamePrefix"] = $vmNamePrefixWithActivation
                $deploymentParams["subnetId"] = "$(subnetId)"
                $deploymentParams["userAssignedIdentityId"] = "$(managedIdentityId)"
                $deploymentParams["DomainKeyVaultId"] = "$(DomainJoinKeyVaultID)"
                $deploymentParams["LocalKeyVaultId"] = "$(keyVaultId)"
                $deploymentParams["SharedImageId"] = "$(SharedImageId)"
                
                # Override marketplace image parameters from JSON config (used when SharedImageId is empty)
                $deploymentParams["imagePublisher"] = "$(imagePublisher)"
                $deploymentParams["imageOffer"] = "$(imageOffer)"
                $deploymentParams["imageSku"] = "$(imageSku)"
                $deploymentParams["imageVersion"] = "$(imageVersion)"
                
                # Override domain join type
                $isEntraJoin = "$(isEntraJoin)"
                $deploymentParams["AADJoin"] = ($isEntraJoin -eq 'true')
                Write-Host "Domain Join Type: $(domainJoinType) (AADJoin = $($deploymentParams['AADJoin']))"
                
                # Add data collection rule if available
                $dataCollectionRuleValue = "$(dataCollectionRuleId)"
                if (-not [string]::IsNullOrEmpty($dataCollectionRuleValue)) {
                  $deploymentParams["dataCollectionRuleId"] = $dataCollectionRuleValue
                }
                
                # Add confidential compute specific parameters
                if ($isConfidentialCompute) {
                  $isCustomerManagedKeys = "$(customerManagedKeys)" -eq "True"
                  Write-Host ""
                  Write-Host "##[section]Confidential Compute Configuration"
                  Write-Host "Customer-Managed Keys (CMK): $isCustomerManagedKeys"

                  if ($isCustomerManagedKeys) {
                    # CMK path: DiskWithVMGuestState + DES from Managed HSM
                    $desId = "$(diskEncryptionSetId)"
                    Write-Host "Disk Encryption Set ID: $desId"

                    if ([string]::IsNullOrEmpty($desId)) {
                      Write-Host "##vso[task.logissue type=error]Disk Encryption Set ID is empty. The DeployDiskEncryptionSet stage may have failed."
                      exit 1
                    }

                    $deploymentParams["diskEncryptionSetId"] = $desId
                    $deploymentParams["securityEncryptionType"] = "DiskWithVMGuestState"
                    Write-Host "Security Encryption Type: DiskWithVMGuestState"
                    Write-Host "Encryption Mode: Customer-Managed Keys (CMK)"
                  } else {
                    # PMK path: VMGuestStateOnly, no DES needed
                    $deploymentParams["diskEncryptionSetId"] = ""
                    $deploymentParams["securityEncryptionType"] = "VMGuestStateOnly"
                    Write-Host "Security Encryption Type: VMGuestStateOnly"
                    Write-Host "Encryption Mode: Platform-Managed Keys (PMK)"
                    Write-Host "No Disk Encryption Set or Managed HSM required"
                  }

                  $deploymentParams["osDiskStorageAccountType"] = "Premium_LRS"
                  Write-Host "OS Disk Storage Account Type: Premium_LRS"
                }
                
                # Handle tags
                if ($deploymentParams.ContainsKey('tags') -and $deploymentParams['tags'] -ne $null) {
                  $tags = $deploymentParams['tags']
                  if ($tags -is [PSObject]) {
                    $newTags = @{}
                    $tags.PSObject.Properties | ForEach-Object {
                      $newTags[$_.Name] = $_.Value
                    }
                    $tags = $newTags
                  }
                } else {
                  $tags = @{}
                }
                
                # Add deployment metadata to tags
                $tags["DeploymentTime"] = $timestamp
                $tags["DeploymentId"] = $deploymentId
                $tags["DeploymentType"] = $operationType
                $tags["DeploymentActivation"] = "${{ parameters.DeploymentActivation }}"
                $tags["BuildNumber"] = "$(Build.BuildNumber)"
                $tags["RequestedBy"] = "$(Build.RequestedFor)"
                $tags["StartingIndex"] = "$startingNumber"
                $tags["RequestedCount"] = "$hostCount"
                if ($isConfidentialCompute) {
                  $tags["SecurityType"] = "ConfidentialVM"
                } else {
                  $tags["SecurityType"] = "TrustedLaunch"
                }
                $deploymentParams["tags"] = $tags
                
                Write-Host ""
                Write-Host "##[section]DEPLOYMENT CONFIGURATION"
                Write-Host "Operation: $operationType"
                Write-Host "Deployment Activation: ${{ parameters.DeploymentActivation }}"
                Write-Host "Subscription: $(subscriptionname)"
                Write-Host "Host Pool Resource Group: $(hostpoolresourcegroup)"
                Write-Host "Hosts Resource Group (VMs): $(hostsresourcegroup)"
                Write-Host "Location (general): $(location)"
                Write-Host "VM Location (session hosts): $(vmLocation)"
                Write-Host "Session Host Count: $hostCount"
                Write-Host "Starting at VM Number: $startingNumber"
                Write-Host "Security Type: $(if ($isConfidentialCompute) { 'ConfidentialVM' } else { 'TrustedLaunch' })"
                Write-Host "Domain Join Type: $(domainJoinType) (AADJoin = $($deploymentParams['AADJoin']))"
                Write-Host ""
                
                # Create temporary parameter file
                $tempParamFile = Join-Path $env:TEMP "$operationType-hosts-params-$(New-Guid).json"
                
                Write-Host "##[section]VMs to be created"
                Write-Host "With vmNamePrefix '$vmNamePrefixWithActivation' starting at index ${startingNumber}:"
                for ($i = 0; $i -lt $hostCount; $i++) {
                  $vmNumber = $startingNumber + $i
                  Write-Host "  - ${vmNamePrefixWithActivation}-$('{0:d2}' -f $vmNumber)"
                }
                
                try {
                  Write-Host ""
                  Write-Host "##[section]Starting deployment..."
                  
                  # Upgrade Azure CLI to fix "content already consumed" bug in 2.77.0
                  Write-Host "##[section]Upgrading Azure CLI to latest version..."
                  $currentVersion = az version --query '\"azure-cli\"' -o tsv
                  Write-Host "Current Azure CLI version: $currentVersion"
                  
                  # Use Azure CLI's embedded Python to upgrade itself
                  $azCliPath = "C:\Program Files\Microsoft SDKs\Azure\CLI2"
                  $pythonPath = "$azCliPath\python.exe"
                  
                  if (Test-Path $pythonPath) {
                    Write-Host "Upgrading Azure CLI using embedded Python..."
                    & $pythonPath -m pip install --upgrade azure-cli --quiet 2>&1 | Out-Null
                    
                    $newVersion = az version --query '\"azure-cli\"' -o tsv
                    Write-Host "Updated Azure CLI version: $newVersion"
                  } else {
                    Write-Host "Warning: Could not find Azure CLI Python, continuing with current version"
                  }
                  
                  Write-Host ""
                  Write-Host "##[section]Checking if resource group exists..."
                  
                  # Check if the hosts resource group exists, create it if not
                  $rgExists = az group exists --name "$(hostsresourcegroup)" --output tsv
                  
                  if ($rgExists -eq "false") {
                    Write-Host "Resource group '$(hostsresourcegroup)' does not exist. Creating it..."
                    
                    # Build tags for resource group - Azure Policy requires specific tags
                    $rgTagsArray = @()
                    if ($deploymentParams.tags) {
                      Write-Host "Using tags from deployment parameters:"
                      foreach ($key in $deploymentParams.tags.Keys) {
                        $value = $deploymentParams.tags[$key]
                        # Escape any special characters in tag values
                        $escapedValue = $value -replace '"', '\"'
                        $rgTagsArray += "`"$key=$escapedValue`""
                        Write-Host "  $key = $value"
                      }
                    }
                    
                    Write-Host ""
                    Write-Host "Creating resource group in location: $(vmLocation)"
                    
                    if ($rgTagsArray.Count -gt 0) {
                      $tagsString = $rgTagsArray -join " "
                      $createCmd = "az group create --name `"$(hostsresourcegroup)`" --location `"$(vmLocation)`" --tags $tagsString --output none"
                      Write-Host "Command: $createCmd"
                      Invoke-Expression $createCmd
                    } else {
                      Write-Host "##[warning]No tags found - resource group creation may fail due to Azure Policy"
                      az group create --name "$(hostsresourcegroup)" --location "$(vmLocation)" --output none
                    }
                    
                    if ($LASTEXITCODE -eq 0) {
                      Write-Host "Resource group '$(hostsresourcegroup)' created successfully"
                    } else {
                      Write-Host "##[error]Failed to create resource group '$(hostsresourcegroup)'"
                      Write-Host "##[error]Azure Policy requires these tags: businessdomain, team, product, owner, environment, applicationowner, app"
                      Write-Host "##[error]Please ensure these tags are defined in the deployment parameters or create the resource group manually."
                      exit 1
                    }
                  } else {
                    Write-Host "Resource group '$(hostsresourcegroup)' already exists"
                  }
                  
                  # ---------------------------------------------------------------
                  # Availability Zone iteration (Approach A)
                  # Try deploying ALL VMs in zone 1. If a zone capacity error
                  # occurs, clean up, then try ALL VMs in zone 2, then zone 3.
                  # This avoids partial failures from spreading across zones.
                  # ---------------------------------------------------------------
                  $zonesToTry = @("1", "2", "3")
                  $deploymentSucceeded = $false
                  $usedZone = $null
                  $zoneCapacityErrorCodes = @(
                    'SkuNotAvailable',
                    'ZonalAllocationFailed',
                    'AllocationFailed',
                    'OverconstrainedZonalAllocationRequest',
                    'OverconstrainedAllocationRequest',
                    'InvalidParameter',
                    'InternalDiskManagementError'
                  )
                  
                  for ($zoneIdx = 0; $zoneIdx -lt $zonesToTry.Count; $zoneIdx++) {
                    $currentZone = $zonesToTry[$zoneIdx]
                    $attempt = $zoneIdx + 1
                    $deploymentName = "Deploy-$operationType-Hosts-$(hostpoolname)-${{ parameters.DeploymentActivation }}-$(Build.BuildId)-z$currentZone"
                    
                    # Set the single-zone array so all VMs land in the same zone
                    $deploymentParams["availabilityZones"] = @($currentZone)
                    
                    Write-Host ""
                    Write-Host "##[section]Attempt $attempt/$($zonesToTry.Count) - Deploying all VMs in Availability Zone $currentZone"
                    Write-Host "Deployment name: $deploymentName"
                    
                    # Write temp parameter file with current zone configuration
                    $paramFileContent = @{
                      "`$schema" = "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#"
                      "contentVersion" = "1.0.0.0"
                      "parameters" = @{}
                    }
                    
                    foreach ($key in $deploymentParams.Keys) {
                      $paramFileContent.parameters[$key] = @{ "value" = $deploymentParams[$key] }
                    }
                    
                    $paramFileContent | ConvertTo-Json -Depth 10 | Out-File -FilePath $tempParamFile -Encoding UTF8
                    
                    Write-Host ""
                    Write-Host "##[section]Running deployment to resource group: $(hostsresourcegroup)..."
                    
                    # Attempt the deployment
                    $deploymentResult = $null
                    $deploymentExitCode = 0
                    
                    try {
                      $ErrorActionPreference = "Continue"
                      $deploymentResult = az deployment group create `
                        --resource-group "$(hostsresourcegroup)" `
                        --name $deploymentName `
                        --template-file "$templatefile" `
                        --parameters "$tempParamFile" `
                        --mode Incremental `
                        --no-prompt true 2>&1
                      $deploymentExitCode = $LASTEXITCODE
                    } catch {
                      Write-Host "##[warning]Caught exception during deployment: $_"
                      $deploymentExitCode = 1
                    }
                    
                    if ($deploymentExitCode -eq 0) {
                      $deploymentSucceeded = $true
                      $usedZone = $currentZone
                      Write-Host ""
                      Write-Host "##[section]Deployment succeeded in Availability Zone $currentZone!"
                      break
                    }
                    
                    # Deployment failed - check if it's a zone capacity error
                    Write-Host "##[warning]Deployment failed in zone $currentZone (exit code: $deploymentExitCode)"
                    Write-Host ""
                    
                    # Collect all error codes from the deployment and nested deployments
                    $isZoneCapacityError = $false
                    
                    Write-Host "##[section]Analyzing deployment errors..."
                    $errors = az deployment operation group list `
                      --resource-group "$(hostsresourcegroup)" `
                      --name $deploymentName `
                      --query "[?properties.provisioningState=='Failed'].properties.statusMessage.error" `
                      --output json 2>$null | ConvertFrom-Json
                    
                    $allOps = az deployment operation group list `
                      --resource-group "$(hostsresourcegroup)" `
                      --name $deploymentName `
                      --output json 2>$null | ConvertFrom-Json
                    
                    $allErrors = @()
                    if ($errors) { $allErrors += $errors }
                    
                    if ($allOps) {
                      $nestedDeployments = $allOps | Where-Object { 
                        $_.properties.targetResource.resourceType -eq "Microsoft.Resources/deployments" -and 
                        $_.properties.provisioningState -eq "Failed" 
                      }
                      foreach ($nested in $nestedDeployments) {
                        $nestedName = $nested.properties.targetResource.resourceName
                        $nestedErrors = az deployment operation group list `
                          --resource-group "$(hostsresourcegroup)" `
                          --name $nestedName `
                          --query "[?properties.provisioningState=='Failed'].properties.statusMessage.error" `
                          --output json 2>$null | ConvertFrom-Json
                        if ($nestedErrors) { $allErrors += $nestedErrors }
                      }
                    }
                    
                    # Walk the error tree looking for zone capacity codes
                    function Test-ZoneCapacityError($errorObj) {
                      if ($zoneCapacityErrorCodes -contains $errorObj.code) { return $true }
                      if ($errorObj.details) {
                        foreach ($d in $errorObj.details) {
                          if (Test-ZoneCapacityError $d) { return $true }
                        }
                      }
                      return $false
                    }
                    
                    foreach ($err in $allErrors) {
                      Write-Host "  Error: $($err.code) - $($err.message)"
                      if (Test-ZoneCapacityError $err) { $isZoneCapacityError = $true }
                    }
                    
                    if (-not $isZoneCapacityError) {
                      # Not a zone capacity error - show full error details and exit
                      Write-Host ""
                      Write-Host "##[error]Deployment failed with a non-zone-capacity error. No zone retry possible."
                      Write-Host "##[error]Deployment output:"
                      Write-Host $deploymentResult
                      
                      Write-Host ""
                      Write-Host "##[section]Deployment Operations with Errors:"
                      az deployment operation group list `
                        --resource-group "$(hostsresourcegroup)" `
                        --name $deploymentName `
                        --query "[?properties.provisioningState=='Failed'].{Resource:properties.targetResource.resourceName, ResourceType:properties.targetResource.resourceType, Status:properties.provisioningState}" `
                        --output table
                      
                      Write-Host "##vso[task.logissue type=error]Failed to deploy $operationType session hosts"
                      exit 1
                    }
                    
                    # Zone capacity error - clean up and try next zone
                    Write-Host ""
                    Write-Host "##[warning]Zone $currentZone has insufficient capacity for VM size '$(vmSize)'. Cleaning up and trying next zone..."
                    
                    for ($i = 0; $i -lt $hostCount; $i++) {
                      $vmNumber = $startingNumber + $i
                      $vmName = "${vmNamePrefixWithActivation}$('{0:d2}' -f $vmNumber)"
                      $nicName = "${vmName}-nic"
                      $osDiskName = "${vmName}-osdisk"
                      
                      $vmExists = az vm show --resource-group "$(hostsresourcegroup)" --name $vmName --query "name" -o tsv 2>$null
                      if ($vmExists) {
                        Write-Host "  Deleting VM $vmName..."
                        az vm delete --resource-group "$(hostsresourcegroup)" --name $vmName --yes --force-deletion true --no-wait false 2>$null
                      }
                      
                      $diskExists = az disk show --resource-group "$(hostsresourcegroup)" --name $osDiskName --query "name" -o tsv 2>$null
                      if ($diskExists) {
                        Write-Host "  Deleting disk $osDiskName..."
                        az disk delete --resource-group "$(hostsresourcegroup)" --name $osDiskName --yes --no-wait false 2>$null
                      }
                      
                      $nicExists = az network nic show --resource-group "$(hostsresourcegroup)" --name $nicName --query "name" -o tsv 2>$null
                      if ($nicExists) {
                        Write-Host "  Deleting NIC $nicName..."
                        az network nic delete --resource-group "$(hostsresourcegroup)" --name $nicName 2>$null
                      }
                    }
                    
                    Write-Host "Cleanup complete."
                  }
                  
                  if (-not $deploymentSucceeded) {
                    Write-Host "##[error]All availability zones exhausted (tried: $($zonesToTry -join ', ')). No zone has capacity for VM size '$(vmSize)' in location '$(vmLocation)'."
                    Write-Host "##vso[task.logissue type=error]Failed to deploy $operationType session hosts - no zone capacity available"
                    exit 1
                  }
                  
                  Write-Host ""
                  Write-Host "##[section]Successfully deployed $hostCount $operationType session hosts!"
                  Write-Host "Security Type: $(if ($isConfidentialCompute) { 'ConfidentialVM' } else { 'TrustedLaunch' })"
                  Write-Host "Availability Zone: $usedZone"
                  Write-Host ""
                  Write-Host "Deployed VMs:"
                  for ($i = 0; $i -lt $hostCount; $i++) {
                    $vmNumber = $startingNumber + $i
                    Write-Host "  - ${vmNamePrefixWithActivation}-$('{0:d2}' -f $vmNumber) (zone $usedZone)"
                  }
                  
                } finally {
                  # Clean up temp file
                  if (Test-Path $tempParamFile) {
                    Remove-Item $tempParamFile -Force
                  }
                }

  # Schedule cleanup for replace operations
  - stage: ScheduleCleanup_${{ parameters.deploymentIdentifier }}
    displayName: "Schedule Old Host Cleanup"
    condition: and(succeeded(), eq(variables.isReplaceOperation, true))
    dependsOn:
      - InitializeParameters_${{ parameters.deploymentIdentifier }}
      - ShutdownAndDeallocateHosts_${{ parameters.deploymentIdentifier }}
      - DeployNewSessionHosts_${{ parameters.deploymentIdentifier }}
    variables:
      subscriptionname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.subscriptionname'] ]
      hostpoolname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolname'] ]
      hostpoolresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostpoolresourcegroup'] ]
      hostsresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.hostsresourcegroup'] ]
      automationaccountname: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.automationaccountname'] ]
      automationresourcegroup: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.automationresourcegroup'] ]
      cleanupDelayDays: $[ stageDependencies.InitializeParameters_${{ parameters.deploymentIdentifier }}.LoadParameters.outputs['setVariables.cleanupDelayDays'] ]
      vmNames: $[ stageDependencies.ShutdownAndDeallocateHosts_${{ parameters.deploymentIdentifier }}.ShutdownHosts.outputs['shutdownHosts.vmNames'] ]
    jobs:
      - job: ScheduleCleanup
        displayName: 'Schedule Deletion'
        steps:
          - task: AzureCLI@2
            displayName: "Re-apply Drain Mode on Old Hosts"
            inputs:
              azureSubscription: '${{ parameters.serviceConnection }}'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $ErrorActionPreference = 'Continue'
                az account set --subscription $(subscriptionname)
                
                Write-Host "##[section]Re-applying drain mode on old hosts"
                Write-Host "Drain mode may have been reset during deallocation or deployment."
                Write-Host ""
                
                $vmNamesJson = '$(vmNames)'
                
                if ([string]::IsNullOrEmpty($vmNamesJson) -or $vmNamesJson -eq '[]') {
                  Write-Host "No VMs to process"
                  exit 0
                }
                
                $vmNames = $vmNamesJson | ConvertFrom-Json
                
                if ($vmNames.Count -eq 0) {
                  Write-Host "No VMs to process"
                  exit 0
                }
                
                $subscriptionId = az account show --query "id" -o tsv 2>$null
                $apiVersion = "2023-09-05"
                $body = '{"properties":{"allowNewSession":false}}'
                
                $successCount = 0
                $failCount = 0
                
                foreach ($vmName in $vmNames) {
                  # Session host name in the host pool is vmName.domainSuffix
                  # Query the host pool to find the matching session host
                  $hostPoolUri = "https://management.azure.com/subscriptions/${subscriptionId}/resourceGroups/$(hostpoolresourcegroup)/providers/Microsoft.DesktopVirtualization/hostPools/$(hostpoolname)/sessionHosts?api-version=${apiVersion}"
                  
                  $allHosts = az rest --method GET --uri "$hostPoolUri" -o json 2>$null | ConvertFrom-Json
                  
                  # Find the session host matching this VM name
                  $matchingHost = $allHosts.value | Where-Object {
                    $shName = $_.name -split "/" | Select-Object -Last 1
                    $shVmName = ($shName -split "\.")[0]
                    $shVmName -eq $vmName
                  }
                  
                  if ($matchingHost) {
                    $sessionHostName = $matchingHost.name -split "/" | Select-Object -Last 1
                    Write-Host "Processing: $vmName (session host: $sessionHostName)"
                    
                    $shUri = "$($matchingHost.id)?api-version=${apiVersion}"
                    
                    $tempBodyFile = [System.IO.Path]::GetTempFileName()
                    [System.IO.File]::WriteAllText($tempBodyFile, $body)
                    
                    $null = az rest --method PATCH --uri "$shUri" --body "@$tempBodyFile" 2>&1
                    
                    if ($LASTEXITCODE -eq 0) {
                      # Verify
                      $verifyResult = az rest --method GET --uri "$shUri" -o json 2>$null
                      $verifyData = $verifyResult | ConvertFrom-Json
                      if ($verifyData.properties.allowNewSession -eq $false) {
                        Write-Host "  [OK] Drain mode enabled (verified)"
                        $successCount++
                      } else {
                        Write-Host "  [WARN] PATCH succeeded but allowNewSession is still True, retrying inline..."
                        $null = az rest --method PATCH --uri "$shUri" --body "$body" 2>&1
                        if ($LASTEXITCODE -eq 0) {
                          Write-Host "  [OK] Retry succeeded"
                          $successCount++
                        } else {
                          Write-Host "  [FAIL] Retry also failed"
                          $failCount++
                        }
                      }
                    } else {
                      Write-Host "  [FAIL] Could not set drain mode"
                      $failCount++
                    }
                    
                    Remove-Item $tempBodyFile -Force -ErrorAction SilentlyContinue
                  } else {
                    Write-Host "Processing: $vmName - session host not found in host pool (may already be removed)"
                  }
                }
                
                Write-Host ""
                Write-Host "##[section]Drain Mode Summary"
                Write-Host "Successfully set: $successCount hosts"
                if ($failCount -gt 0) {
                  Write-Host "Failed: $failCount hosts"
                }
                
                # Don't fail the pipeline if drain mode can't be re-applied
                exit 0

          - task: AzureCLI@2
            displayName: "Schedule Old Host Deletion"
            inputs:
              azureSubscription: '${{ parameters.serviceConnection }}'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $ErrorActionPreference = 'Continue'
                az account set --subscription $(subscriptionname)
                
                # Ensure we have the cleanup delay as an integer
                $cleanupDays = [int]$(cleanupDelayDays)
                
                Write-Host "##[section]Scheduling cleanup of old hosts in $cleanupDays days"
                
                $vmNamesJson = '$(vmNames)'
                
                # Handle case where there are no VMs to clean up
                if ([string]::IsNullOrEmpty($vmNamesJson) -or $vmNamesJson -eq '[]') {
                  Write-Host "No VMs to schedule for cleanup"
                  exit 0
                }
                
                $vmNames = $vmNamesJson | ConvertFrom-Json
                
                if ($vmNames.Count -eq 0) {
                  Write-Host "No VMs to schedule for cleanup"
                  exit 0
                }
                
                Write-Host "VMs scheduled for cleanup:"
                foreach ($vmName in $vmNames) {
                  Write-Host "  - $vmName"
                }
                
                # Calculate cleanup date properly
                $currentDate = Get-Date
                $cleanupDate = $currentDate.AddDays($cleanupDays)
                $cleanupDateISO = $cleanupDate.ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
                
                Write-Host ""
                Write-Host "Current date: $($currentDate.ToString('yyyy-MM-dd HH:mm:ss'))"
                Write-Host "Cleanup will occur on: $($cleanupDate.ToString('yyyy-MM-dd HH:mm:ss'))"
                Write-Host "ISO format: $cleanupDateISO"
                
                # Create or update tags on VMs to track cleanup schedule
                $taggedCount = 0
                $failedCount = 0
                
                foreach ($vmName in $vmNames) {
                  Write-Host "Tagging VM $vmName for scheduled cleanup..."
                  
                  # Check if VM still exists before trying to tag it
                  $vmExists = az vm show --resource-group "$(hostsresourcegroup)" --name $vmName --query "name" -o tsv 2>$null
                  
                  if ($vmExists) {
                    # Apply all tags in a single update
                    $taggedOn = $currentDate.ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
                    $output = az vm update --resource-group "$(hostsresourcegroup)" --name $vmName --set tags.ScheduledForDeletion="$cleanupDateISO" tags.ReplacementDeploymentId="$(Build.BuildId)" tags.ReplacementStatus="Replaced" tags.CleanupDelayDays="$cleanupDays" tags.TaggedOn="$taggedOn" 2>&1
                    
                    if ($LASTEXITCODE -eq 0) {
                      Write-Host "  [OK] Successfully tagged for deletion on $($cleanupDate.ToString('yyyy-MM-dd'))"
                      $taggedCount++
                    } else {
                      $errorMsg = ($output | Out-String).Trim()
                      Write-Host "  [FAIL] Failed to tag VM"
                      Write-Host "  Error: $errorMsg"
                      $failedCount++
                    }
                  } else {
                    Write-Host "  [SKIP] VM no longer exists (already deleted)"
                  }
                }
                
                Write-Host ""
                Write-Host "##[section]============================================"
                Write-Host "CLEANUP SCHEDULING COMPLETE"
                Write-Host "============================================"
                Write-Host "Tagged $taggedCount of $($vmNames.Count) VMs for deletion"
                if ($failedCount -gt 0) {
                  Write-Host "Failed to tag: $failedCount VMs"
                }
                Write-Host "Deletion date: $($cleanupDate.ToString('yyyy-MM-dd HH:mm:ss'))"
                Write-Host ""
                Write-Host "Next Steps:"
                Write-Host "1. Create an Azure Automation runbook that:"
                Write-Host "   - Runs daily to check for VMs with ScheduledForDeletion tags"
                Write-Host "   - Deletes VMs and associated resources when the date is reached"
                Write-Host "2. Or manually delete the VMs on $($cleanupDate.ToString('yyyy-MM-dd'))"
                Write-Host ""
                Write-Host "Tagged VMs:"
                foreach ($vmName in $vmNames) {
                  Write-Host "  - $vmName"
                }
                Write-Host ""
                Write-Host "To manually delete these VMs later, run:"
                Write-Host "az vm delete --resource-group $(hostsresourcegroup) --name <vmname> --yes"
                Write-Host "============================================"
                
                # Always exit success - tagging failures should not block the pipeline
                exit 0
