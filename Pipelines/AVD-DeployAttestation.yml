trigger:
- none

pool:
  name: ${{ parameters.agentPool }}

# ---------------------------------------------------------------------------
# AVD-DeployAttestation pipeline
#
# Deploys and validates Guest Attestation monitoring infrastructure for
# Confidential AVD session hosts.
#
# IMPORTANT: This pipeline does NOT deploy a custom Azure Attestation Provider.
# The Microsoft.Attestation/attestationProviders resource type is not available
# in Belgium Central. All session hosts use the Microsoft shared MAA endpoint:
#
#   West Europe  : https://sharedweu.weu.attest.azure.net
#   North Europe : https://sharedneu.neu.attest.azure.net
#
# The shared endpoint provides identical cryptographic attestation guarantees
# to a dedicated provider instance. No policy customisation is required for
# Confidential AVD - the Microsoft baseline policy validates AMD SEV-SNP,
# Secure Boot, and vTPM state out of the box.
#
# Stages:
#   1. Approval gate  - human sign-off before any changes
#   2. Deploy DCR     - CVM-specific Data Collection Rule for attestation events
#   3. Deploy Policy  - Azure Policy definition (optional, can skip)
#   4. Validate       - runs Get-AttestationStatus.ps1 against all CVMs
#                       (extension check + JWT claims decode + RS256 sig verify)
# ---------------------------------------------------------------------------

parameters:
  - name: agentPool
    type: string
    default: '<AGENT_POOL_NAME>'
    displayName: "Agent pool name"

  - name: serviceConnection
    type: string
    default: '<SERVICE_CONNECTION_NAME>'
    displayName: "Azure DevOps service connection name"

  - name: approvalEnvironment
    type: string
    default: '<APPROVAL_ENVIRONMENT_NAME>'
    displayName: "Azure DevOps approval environment name"

  - name: subscriptionName
    type: string
    default: '<SUBSCRIPTION_NAME>'
    displayName: "Azure subscription name or ID"

  - name: resourceGroup
    type: string
    default: 'rg-avd-attest-prd-weu-001'
    displayName: "Resource group for attestation monitoring infrastructure (DCR, Policy)"

  - name: hostsResourceGroup
    type: string
    default: 'rg-avd-prd-hosts'
    displayName: "Resource group containing session host VMs"

  - name: hostPoolName
    type: string
    default: 'hp-avd-prd-weu-001'
    displayName: "AVD host pool name (for validation output)"

  - name: location
    type: string
    default: 'westeurope'
    displayName: "Azure region for DCR deployment"

  - name: maaEndpoint
    type: string
    default: 'https://sharedweu.weu.attest.azure.net'
    displayName: "Microsoft shared MAA endpoint for JWT signature verification"

  - name: deployPolicy
    type: boolean
    default: true
    displayName: "Deploy Azure Policy definition for Guest Attestation enforcement"

  - name: skipJwtValidation
    type: boolean
    default: false
    displayName: "Skip JWT claims decode and signature verification in validate stage"

  - name: deploymentIdentifier
    type: string
    default: "deployment"
    displayName: "Unique deployment identifier (namespaces pipeline stages)"

stages:
  # ---------------------------------------------------------------------------
  # Approval gate
  # ---------------------------------------------------------------------------
  - stage: approvalGate_${{ parameters.deploymentIdentifier }}
    displayName: "Approval Gate"
    jobs:
      - deployment: attestationDeployment
        displayName: "Approval Gate for Attestation Deployment"
        environment: ${{ parameters.approvalEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

  # ---------------------------------------------------------------------------
  # Deploy CVM Data Collection Rule
  # ---------------------------------------------------------------------------
  - stage: DeployDCR_${{ parameters.deploymentIdentifier }}
    displayName: "Deploy CVM Data Collection Rule"
    dependsOn: approvalGate_${{ parameters.deploymentIdentifier }}
    condition: succeeded('approvalGate_${{ parameters.deploymentIdentifier }}')
    jobs:
      - job: DeployDCR
        displayName: "Deploy DCR for attestation and CVM monitoring"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Ensure Resource Group Exists"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"
                $rg = az group show --name "${{ parameters.resourceGroup }}" --query "name" -o tsv 2>$null
                if (-not $rg) {
                  Write-Host "Creating resource group ${{ parameters.resourceGroup }}"
                  az group create `
                    --name "${{ parameters.resourceGroup }}" `
                    --location "${{ parameters.location }}"
                  if ($LASTEXITCODE -ne 0) {
                    Write-Host "##vso[task.logissue type=error]Failed to create resource group."
                    exit 1
                  }
                } else {
                  Write-Host "Resource group ${{ parameters.resourceGroup }} already exists."
                }

          - task: AzureCLI@2
            displayName: "What-If: CVM Data Collection Rule"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"
                az deployment group what-if `
                  --resource-group "${{ parameters.resourceGroup }}" `
                  --name "DCR-WhatIf-$(Build.BuildId)" `
                  --template-file "$(System.DefaultWorkingDirectory)/ComponentLibrary/GuestAttestation/dcr-confidential-avd.bicep" `
                  --parameters "$(System.DefaultWorkingDirectory)/ComponentLibrary/GuestAttestation/dcr-confidential-avd.parameters.json" `
                  --no-prompt true

          - task: AzureCLI@2
            displayName: "Deploy CVM Data Collection Rule"
            name: dcrDeploy
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"

                $output = az deployment group create `
                  --resource-group "${{ parameters.resourceGroup }}" `
                  --name "DCR-$(Build.BuildId)" `
                  --template-file "$(System.DefaultWorkingDirectory)/ComponentLibrary/GuestAttestation/dcr-confidential-avd.bicep" `
                  --parameters "$(System.DefaultWorkingDirectory)/ComponentLibrary/GuestAttestation/dcr-confidential-avd.parameters.json" `
                  --mode Incremental `
                  --no-prompt true `
                  -o json

                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##vso[task.logissue type=error]DCR deployment failed."
                  exit 1
                }

                $dcrId = ($output | ConvertFrom-Json).properties.outputs.dataCollectionRuleId.value
                Write-Host "DCR Resource ID: $dcrId"
                Write-Host "##vso[task.setvariable variable=dataCollectionRuleId;isOutput=true]$dcrId"
                Write-Host ""
                Write-Host "##[section]NEXT STEP: Update hostpool config"
                Write-Host "Set dataCollectionRuleId in your hostpool JSON config to: $dcrId"
                Write-Host "New session hosts deployed by AVD-DeployAdditionalHosts will"
                Write-Host "automatically associate with this DCR."
                Write-Host "##[section]CVM Data Collection Rule deployed."

  # ---------------------------------------------------------------------------
  # Deploy Azure Policy definition (optional)
  # ---------------------------------------------------------------------------
  - stage: DeployPolicy_${{ parameters.deploymentIdentifier }}
    displayName: "Deploy Azure Policy for Guest Attestation"
    dependsOn: approvalGate_${{ parameters.deploymentIdentifier }}
    condition: and(succeeded('approvalGate_${{ parameters.deploymentIdentifier }}'), eq('${{ parameters.deployPolicy }}', 'true'))
    jobs:
      - job: Policy
        displayName: "Deploy Guest Attestation policy definition"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Deploy Guest Attestation Policy Definition"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"

                az deployment group create `
                  --resource-group "${{ parameters.resourceGroup }}" `
                  --name "Policy-$(Build.BuildId)" `
                  --template-file "$(System.DefaultWorkingDirectory)/ComponentLibrary/Policy/policy-require-guest-attestation.bicep" `
                  --mode Incremental `
                  --no-prompt true

                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##vso[task.logissue type=error]Policy definition deployment failed."
                  exit 1
                }

                Write-Host "##[section]Policy definition deployed."
                Write-Host ""
                Write-Host "NEXT STEP: Assign the policy in the Azure Portal."
                Write-Host "Go to: Azure Portal > Policy > Assignments > Assign Policy"
                Write-Host "Select: require-guest-attestation-confidential-avd"
                Write-Host "Scope: subscription or resource group containing your CVM session hosts"
                Write-Host "Effect: AuditIfNotExists (switch to Deny once all hosts are compliant)"

  # ---------------------------------------------------------------------------
  # Validate Guest Attestation across all CVM session hosts
  # Runs after DCR and Policy stages complete (or are skipped).
  # Performs three levels of validation:
  #   1. GuestAttestation extension provisioning state (control plane)
  #   2. JWT claims decode - validates sevsnpvm, azure-compliant-cvm, secureboot
  #   3. RS256 signature verification against the Microsoft shared MAA certs
  # ---------------------------------------------------------------------------
  - stage: Validate_${{ parameters.deploymentIdentifier }}
    displayName: "Validate Guest Attestation"
    dependsOn:
      - DeployDCR_${{ parameters.deploymentIdentifier }}
      - DeployPolicy_${{ parameters.deploymentIdentifier }}
    condition: |
      and(
        in(dependencies.DeployDCR_${{ parameters.deploymentIdentifier }}.result, 'Succeeded', 'SucceededWithIssues'),
        in(dependencies.DeployPolicy_${{ parameters.deploymentIdentifier }}.result, 'Succeeded', 'SucceededWithIssues', 'Skipped')
      )
    jobs:
      - job: Validate
        displayName: "Run Get-AttestationStatus.ps1"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Validate attestation on all CVM session hosts"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"

                $params = @{
                  SubscriptionName   = "${{ parameters.subscriptionName }}"
                  HostsResourceGroup = "${{ parameters.hostsResourceGroup }}"
                  HostPoolName       = "${{ parameters.hostPoolName }}"
                  MaaEndpoint        = "${{ parameters.maaEndpoint }}"
                }

                if ("${{ parameters.skipJwtValidation }}" -eq "true") {
                  $params["SkipJwtValidation"] = $true
                }

                & "$(System.DefaultWorkingDirectory)/Scripts/Get-AttestationStatus.ps1" @params

                if ($LASTEXITCODE -eq 1) {
                  Write-Host "##vso[task.logissue type=error]Attestation validation FAILED. See output above."
                  exit 1
                }
                if ($LASTEXITCODE -eq 2) {
                  Write-Host "##vso[task.logissue type=warning]Some validations were inconclusive (VMs may be deallocated)."
                  Write-Host "##vso[task.logissue type=warning]Re-run after starting all session hosts."
                }
