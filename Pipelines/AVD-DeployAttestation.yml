trigger:
- none

pool:
  name: ${{ parameters.agentPool }}

# ---------------------------------------------------------------------------
# AVD-DeployAttestation pipeline
#
# Deploys and validates the Guest Attestation infrastructure for Confidential
# AVD session hosts. Run this pipeline once per environment before deploying
# your first CVM session hosts, or when adding attestation monitoring to an
# existing Confidential AVD deployment.
#
# Stages:
#   1. Approval gate  - human sign-off before any changes
#   2. Deploy         - Attestation Provider + CVM-specific Data Collection Rule
#   3. Validate       - checks GuestAttestation extension health on all CVMs
#   4. Policy         - deploys the Azure Policy definition (optional)
# ---------------------------------------------------------------------------

parameters:
  - name: agentPool
    type: string
    default: '<AGENT_POOL_NAME>'
    displayName: "Agent pool name"

  - name: serviceConnection
    type: string
    default: '<SERVICE_CONNECTION_NAME>'
    displayName: "Azure DevOps service connection name"

  - name: approvalEnvironment
    type: string
    default: '<APPROVAL_ENVIRONMENT_NAME>'
    displayName: "Azure DevOps approval environment name"

  - name: subscriptionName
    type: string
    displayName: "Azure subscription name or ID"
    default: '<SUBSCRIPTION_NAME>'

  - name: resourceGroup
    type: string
    displayName: "Resource group for attestation infrastructure"
    default: 'rg-avd-attest-prd-weu-001'

  - name: hostsResourceGroup
    type: string
    displayName: "Resource group containing session host VMs"
    default: 'rg-avd-prd-hosts'

  - name: hostPoolName
    type: string
    displayName: "AVD host pool name (for validation output)"
    default: 'hp-avd-prd-weu-001'

  - name: location
    type: string
    displayName: "Azure region"
    default: 'westeurope'

  - name: deployPolicy
    type: boolean
    displayName: "Deploy Azure Policy definition for Guest Attestation"
    default: true

  - name: deploymentIdentifier
    type: string
    default: "deployment"
    displayName: "Unique deployment identifier"

stages:
  # ---------------------------------------------------------------------------
  # Approval gate
  # ---------------------------------------------------------------------------
  - stage: approvalGate_${{ parameters.deploymentIdentifier }}
    displayName: "Approval Gate"
    jobs:
      - deployment: attestationDeployment
        displayName: "Approval Gate for Attestation Deployment"
        environment: ${{ parameters.approvalEnvironment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

  # ---------------------------------------------------------------------------
  # Deploy Attestation Provider and Data Collection Rule
  # ---------------------------------------------------------------------------
  - stage: DeployAttestation_${{ parameters.deploymentIdentifier }}
    displayName: "Deploy Attestation Infrastructure"
    dependsOn: approvalGate_${{ parameters.deploymentIdentifier }}
    condition: succeeded('approvalGate_${{ parameters.deploymentIdentifier }}')
    jobs:
      - job: Deploy
        displayName: "Deploy Attestation Provider and DCR"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Ensure Resource Group Exists"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"
                $rg = az group show --name "${{ parameters.resourceGroup }}" --query "name" -o tsv 2>$null
                if (-not $rg) {
                  Write-Host "Creating resource group ${{ parameters.resourceGroup }}"
                  az group create `
                    --name "${{ parameters.resourceGroup }}" `
                    --location "${{ parameters.location }}"
                } else {
                  Write-Host "Resource group ${{ parameters.resourceGroup }} already exists."
                }

          - task: AzureCLI@2
            displayName: "What-If: Attestation Provider"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"
                az deployment group what-if `
                  --resource-group "${{ parameters.resourceGroup }}" `
                  --name "Attest-WhatIf-$(Build.BuildId)" `
                  --template-file "$(System.DefaultWorkingDirectory)/ComponentLibrary/GuestAttestation/attestation-provider.bicep" `
                  --parameters "$(System.DefaultWorkingDirectory)/ComponentLibrary/GuestAttestation/attestation-provider.parameters.json" `
                  --no-prompt true

          - task: AzureCLI@2
            displayName: "Deploy Attestation Provider"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"

                $output = az deployment group create `
                  --resource-group "${{ parameters.resourceGroup }}" `
                  --name "Attest-$(Build.BuildId)" `
                  --template-file "$(System.DefaultWorkingDirectory)/ComponentLibrary/GuestAttestation/attestation-provider.bicep" `
                  --parameters "$(System.DefaultWorkingDirectory)/ComponentLibrary/GuestAttestation/attestation-provider.parameters.json" `
                  --mode Incremental `
                  --no-prompt true `
                  -o json

                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##vso[task.logissue type=error]Attestation Provider deployment failed."
                  exit 1
                }

                $outputs = ($output | ConvertFrom-Json).properties.outputs
                $attestUri = $outputs.attestationProviderUri.value

                Write-Host "Attestation Provider URI: $attestUri"
                Write-Host "##vso[task.setvariable variable=attestationProviderUri;isOutput=true]$attestUri"
                Write-Host "##[section]Attestation Provider deployed."
            name: attestDeploy

          - task: AzureCLI@2
            displayName: "Deploy CVM Data Collection Rule"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"

                $output = az deployment group create `
                  --resource-group "${{ parameters.resourceGroup }}" `
                  --name "DCR-$(Build.BuildId)" `
                  --template-file "$(System.DefaultWorkingDirectory)/ComponentLibrary/GuestAttestation/dcr-confidential-avd.bicep" `
                  --parameters "$(System.DefaultWorkingDirectory)/ComponentLibrary/GuestAttestation/dcr-confidential-avd.parameters.json" `
                  --mode Incremental `
                  --no-prompt true `
                  -o json

                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##vso[task.logissue type=error]DCR deployment failed."
                  exit 1
                }

                $dcrId = ($output | ConvertFrom-Json).properties.outputs.dataCollectionRuleId.value
                Write-Host "DCR ID: $dcrId"
                Write-Host "##vso[task.setvariable variable=dataCollectionRuleId;isOutput=true]$dcrId"
                Write-Host "##[section]CVM Data Collection Rule deployed."
            name: dcrDeploy

  # ---------------------------------------------------------------------------
  # Validate attestation extension health on existing session hosts
  # ---------------------------------------------------------------------------
  - stage: Validate_${{ parameters.deploymentIdentifier }}
    displayName: "Validate Guest Attestation Extension"
    dependsOn: DeployAttestation_${{ parameters.deploymentIdentifier }}
    condition: succeeded('DeployAttestation_${{ parameters.deploymentIdentifier }}')
    jobs:
      - job: Validate
        displayName: "Check attestation extension on all CVMs"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Run Get-AttestationStatus.ps1"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"

                $result = & "$(System.DefaultWorkingDirectory)/Scripts/Get-AttestationStatus.ps1" `
                    -SubscriptionName "${{ parameters.subscriptionName }}" `
                    -HostsResourceGroup "${{ parameters.hostsResourceGroup }}" `
                    -HostPoolName "${{ parameters.hostPoolName }}"

                if ($LASTEXITCODE -eq 1) {
                  Write-Host "##vso[task.logissue type=error]One or more session hosts have failed attestation. See output above."
                  exit 1
                }
                if ($LASTEXITCODE -eq 2) {
                  Write-Host "##vso[task.logissue type=warning]Some extensions still provisioning. Re-run validation in a few minutes."
                }

  # ---------------------------------------------------------------------------
  # Deploy Azure Policy definition (optional)
  # ---------------------------------------------------------------------------
  - stage: DeployPolicy_${{ parameters.deploymentIdentifier }}
    displayName: "Deploy Azure Policy for Guest Attestation"
    dependsOn: DeployAttestation_${{ parameters.deploymentIdentifier }}
    condition: and(succeeded('DeployAttestation_${{ parameters.deploymentIdentifier }}'), eq('${{ parameters.deployPolicy }}', 'true'))
    jobs:
      - job: Policy
        displayName: "Deploy policy definition"
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: "Deploy Guest Attestation Policy Definition"
            inputs:
              azureSubscription: "${{ parameters.serviceConnection }}"
              scriptType: "ps"
              scriptLocation: "inlineScript"
              inlineScript: |
                az account set --subscription "${{ parameters.subscriptionName }}"

                az deployment group create `
                  --resource-group "${{ parameters.resourceGroup }}" `
                  --name "Policy-$(Build.BuildId)" `
                  --template-file "$(System.DefaultWorkingDirectory)/ComponentLibrary/Policy/policy-require-guest-attestation.bicep" `
                  --mode Incremental `
                  --no-prompt true

                if ($LASTEXITCODE -ne 0) {
                  Write-Host "##vso[task.logissue type=error]Policy definition deployment failed."
                  exit 1
                }

                Write-Host "##[section]Policy definition deployed."
                Write-Host ""
                Write-Host "NEXT STEP: Assign the policy to your AVD session host subscription or resource group."
                Write-Host "Go to: Azure Portal > Policy > Assignments > Assign Policy"
                Write-Host "Select: require-guest-attestation-confidential-avd"
                Write-Host "Scope: subscription or resource group containing your CVM session hosts"
